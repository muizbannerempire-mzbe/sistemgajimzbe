<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem HRMS - Muiz Banner Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div id="root"></div>

    <!-- Modul Firebase (Versi 11) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        window.fbModules = { initializeApp, getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getAuth, signInAnonymously, onAuthStateChanged };
    </script>

    <!-- Aplikasi React -->
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- PEMUATAN FIREBASE ---
        const waitForFirebase = setInterval(() => {
            if (window.fbModules) {
                clearInterval(waitForFirebase);
                initApp();
            }
        }, 50);

        function initApp() {
            const { initializeApp, getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getAuth, signInAnonymously, onAuthStateChanged } = window.fbModules;

            // --- KONFIGURASI FIREBASE ---
            const firebaseConfig = {
                apiKey: "AIzaSyAd_sBPBJ4Zru0gbX8dCD9FxJ4Qc0Dt7-Q",
                authDomain: "sistemgajimuiz.firebaseapp.com",
                projectId: "sistemgajimuiz",
                storageBucket: "sistemgajimuiz.firebasestorage.app",
                messagingSenderId: "971845171525",
                appId: "1:971845171525:web:a4ba8a5848d2262dac262c"
            };

            let app, db, auth;
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            } catch(e) {
                console.error("Firebase init failed:", e);
                return;
            }
            
            const APP_ID = 'sistemgajimzbe'; 

            // --- TETAPAN GPS KEDAI ---
            const SHOP_LAT = 5.76973; 
            const SHOP_LNG = 102.56143; 
            const ALLOWED_RADIUS = 150; 

            // --- FUNGSI UTILITI ---
            function getDistanceInMeters(lat1, lon1, lat2, lon2) {
                const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180; 
                const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
            
            const getTodayString = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };
            const formatTimeDisplay = (iso) => {
                if(!iso) return '--:--'; const d = new Date(iso);
                let h = d.getHours(); let m = d.getMinutes(); const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12; m = String(m).padStart(2, '0'); return `${h}:${m} ${ampm}`;
            };
            const MONTHS = ['', 'Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];

            // --- KOMPONEN IKON ---
            const Icons = {
                LogOut: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
                Clock: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                Alert: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
                Check: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
                MapPin: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
                Trash: () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                Settings: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                ChartBar: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
            };

            // ==========================================
            // KOMPONEN UTAMA (APP)
            // ==========================================
            function MainApp() {
                const [authUser, setAuthUser] = useState(null);
                const [currentUser, setCurrentUser] = useState(null);
                const [activeTab, setActiveTab] = useState('attendance');
                
                // State Data
                const [employees, setEmployees] = useState([]);
                const [attendances, setAttendances] = useState([]);
                const [leaves, setLeaves] = useState([]);
                const [salaries, setSalaries] = useState([]);
                const [settings, setSettings] = useState({ clockOutTime: '17:00', bypassGps: false });
                
                // UI State
                const [toast, setToast] = useState(null);
                const [isDbReady, setIsDbReady] = useState(false);

                const showToast = useCallback((msg, type = 'info') => {
                    setToast({ msg, type });
                    setTimeout(() => setToast(null), 3000);
                }, []);

                // 1. Inisialisasi Auth Firebase
                useEffect(() => {
                    signInAnonymously(auth).catch(e => console.error("Auth Anon Gagal:", e));
                    const unsub = onAuthStateChanged(auth, user => { setAuthUser(user); });
                    return () => unsub();
                }, []);

                // 2. Muat Turun Data Realtime
                useEffect(() => {
                    if (!authUser) return;
                    const bPath = ['artifacts', APP_ID, 'public', 'data'];
                    
                    const unsubEmp = onSnapshot(collection(db, ...bPath, 'employees'), snap => {
                        const emps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        if(emps.length === 0) {
                            const defaultEmps = [
                                { code: 'MZBE012024', name: 'Ahmad Bukharie', dept: 'Pengeluaran', position: 'Operator', basic: 1800, ic: '040421110053' },
                                { code: 'MZBE092022', name: 'Ammar Zakwan', dept: 'Operasi', position: 'Pengurus', basic: 2100, ic: '980416036979' },
                                { code: 'ADMIN', name: 'SUPER ADMIN', dept: 'Pengurusan', position: 'Admin', basic: 0, ic: '' }
                            ];
                            defaultEmps.forEach(e => setDoc(doc(db, ...bPath, 'employees', e.code), e));
                        } else { setEmployees(emps); setIsDbReady(true); }
                    }, e => console.error("Emp error", e));

                    const unsubAtt = onSnapshot(collection(db, ...bPath, 'attendance'), snap => setAttendances(snap.docs.map(d => ({ id: d.id, ...d.data() }))), e => console.error(e));
                    const unsubLvs = onSnapshot(collection(db, ...bPath, 'leaves'), snap => setLeaves(snap.docs.map(d => ({ id: d.id, ...d.data() }))), e => console.error(e));
                    const unsubSal = onSnapshot(collection(db, ...bPath, 'salaries'), snap => setSalaries(snap.docs.map(d => ({ id: d.id, ...d.data() }))), e => console.error(e));
                    const unsubSet = onSnapshot(doc(db, ...bPath, 'settings', 'config'), docSnap => { if(docSnap.exists()) setSettings(docSnap.data()); }, e => console.error(e));

                    return () => { unsubEmp(); unsubAtt(); unsubLvs(); unsubSal(); unsubSet(); };
                }, [authUser]);

                // Skrin Log Masuk
                if (!currentUser) {
                    return <LoginScreen employees={employees} onLogin={(user) => setCurrentUser(user)} isReady={isDbReady} showToast={showToast} />;
                }

                // Struktur UI Papan Pemuka
                return (
                    <div className="min-h-screen flex flex-col relative">
                        {/* Header */}
                        <header className="bg-gradient-to-r from-slate-800 to-slate-900 text-white p-4 shadow-lg z-20">
                            <div className="max-w-7xl mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white p-1 rounded-lg"><img src="logo.png" alt="MBE" className="h-8 w-auto object-contain" onError={(e)=>{e.target.style.display='none'}}/></div>
                                    <div><h1 className="font-bold leading-tight">HRMS Pintar MBE</h1><p className="text-[10px] text-slate-300">{currentUser.name}</p></div>
                                </div>
                                <button onClick={() => setCurrentUser(null)} className="flex items-center gap-2 bg-rose-500 hover:bg-rose-600 px-3 py-1.5 rounded-lg text-sm font-bold transition"><Icons.LogOut/> Keluar</button>
                            </div>
                        </header>

                        {/* Navigasi Tab */}
                        <div className="bg-white border-b shadow-sm z-10 overflow-x-auto hide-scroll">
                            <div className="max-w-7xl mx-auto px-4 flex gap-2">
                                <TabBtn label="Kehadiran" icon="⏱️" active={activeTab === 'attendance'} onClick={() => setActiveTab('attendance')} />
                                <TabBtn label="Cuti" icon="🏖️" active={activeTab === 'leaves'} onClick={() => setActiveTab('leaves')} />
                                {currentUser.code === 'ADMIN' && <TabBtn label="Gaji & Laporan" icon="💰" active={activeTab === 'salary'} onClick={() => setActiveTab('salary')} />}
                                {currentUser.code === 'ADMIN' && <TabBtn label="Tetapan Admin" icon="⚙️" active={activeTab === 'admin'} onClick={() => setActiveTab('admin')} />}
                            </div>
                        </div>

                        {/* Kandungan Tab */}
                        <main className="flex-1 p-4 md:p-6 overflow-y-auto">
                            <div className="max-w-7xl mx-auto animate-fade">
                                {activeTab === 'attendance' && <ModuleAttendance user={currentUser} attendances={attendances} leaves={leaves} settings={settings} db={db} appId={APP_ID} showToast={showToast} />}
                                {activeTab === 'leaves' && <ModuleLeaves user={currentUser} leaves={leaves} employees={employees} db={db} appId={APP_ID} showToast={showToast} />}
                                {activeTab === 'salary' && currentUser.code === 'ADMIN' && <ModuleSalary attendances={attendances} leaves={leaves} salaries={salaries} employees={employees} db={db} appId={APP_ID} showToast={showToast} />}
                                {activeTab === 'admin' && currentUser.code === 'ADMIN' && <ModuleAdmin employees={employees} settings={settings} db={db} appId={APP_ID} showToast={showToast} />}
                            </div>
                        </main>

                        {/* Komponen Toast */}
                        {toast && (
                            <div className={`fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl font-bold text-white z-50 animate-fade flex items-center gap-2 ${toast.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                                {toast.type === 'success' ? <Icons.Check/> : <Icons.Alert/>} {toast.msg}
                            </div>
                        )}
                    </div>
                );
            }

            const TabBtn = ({ label, icon, active, onClick }) => (
                <button onClick={onClick} className={`whitespace-nowrap px-4 py-3 font-bold text-sm border-b-2 transition-colors flex items-center gap-2 ${active ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}>
                    <span>{icon}</span> {label}
                </button>
            );

            // ==========================================
            // KOMPONEN: LOG MASUK
            // ==========================================
            function LoginScreen({ employees, onLogin, isReady, showToast }) {
                const [username, setUsername] = useState('');
                const [password, setPassword] = useState('');

                const handleSubmit = (e) => {
                    e.preventDefault();
                    const cleanUser = username.trim().toUpperCase();
                    // Jika Admin
                    if(cleanUser === 'ADMIN' && password === 'admin123') {
                        onLogin({ code: 'ADMIN', name: 'Administrator' }); return;
                    }
                    // Jika Pekerja Biasa (Password default ialah Kod Pekerja)
                    const emp = employees.find(e => e.code === cleanUser);
                    if(emp && password === emp.code) {
                        onLogin(emp);
                    } else {
                        showToast("ID atau Kata Laluan tidak sah.", "error");
                    }
                };

                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="glass-card rounded-3xl p-8 w-full max-w-md animate-fade border border-white/50">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-black text-slate-800 mb-1">MBE HRMS</h1>
                                <p className="text-slate-500 text-sm font-medium">Sistem Pengurusan Pekerja</p>
                            </div>
                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Kod Pekerja</label>
                                    <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none uppercase font-bold text-slate-700 transition" placeholder="Cth: MZBE012024" required/>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Kata Laluan</label>
                                    <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none font-bold text-slate-700 transition" placeholder="Masukkan kata laluan" required/>
                                </div>
                                <button type="submit" disabled={!isReady} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-lg shadow-blue-600/30 hover:bg-blue-700 active:scale-[0.98] transition disabled:opacity-50 flex justify-center items-center gap-2">
                                    {!isReady ? <><div className="loader border-white border-t-blue-600 w-5 h-5"></div> Memuat...</> : 'Log Masuk Sistem'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // MODUL 1: KEHADIRAN (PUNCH CARD)
            // ==========================================
            function ModuleAttendance({ user, attendances, leaves, settings, db, appId, showToast }) {
                const isAdmin = user.code === 'ADMIN';
                const today = getTodayString();
                const [filterDate, setFilterDate] = useState(today);
                const [modalGps, setModalGps] = useState(null);
                const [appealReason, setAppealReason] = useState('');

                const myAtt = attendances.find(a => a.date === today && a.empCode === user.code) || {};
                const isOnLeave = leaves.some(l => l.empCode === user.code && l.status === 'Lulus' && today >= l.startDate && today <= l.endDate);

                // --- LOGIK GEOFENCING ---
                const verifyLocationAndExecute = (actionName, callback) => {
                    if (settings.bypassGps || isAdmin) { callback(); return; }
                    
                    setModalGps({ type: 'loading', msg: 'Sedang mencari isyarat GPS...' });
                    if (!navigator.geolocation) { setModalGps({ type: 'error', msg: 'Peranti anda tidak menyokong GPS.' }); return; }

                    navigator.geolocation.getCurrentPosition(pos => {
                        const dist = getDistanceInMeters(pos.coords.latitude, pos.coords.longitude, SHOP_LAT, SHOP_LNG);
                        if (dist <= ALLOWED_RADIUS) {
                            setModalGps(null); callback();
                        } else {
                            setModalGps({ type: 'error', msg: `Akses ditolak. Anda berada ${Math.round(dist)}m dari kedai. Sila berada dalam radius ${ALLOWED_RADIUS}m.` });
                        }
                    }, err => {
                        setModalGps({ type: 'error', msg: 'Sila benarkan akses Lokasi (Location/GPS) pada pelayar anda.' });
                    }, { enableHighAccuracy: true });
                };

                const punch = async (field) => {
                    const now = new Date();
                    const recordId = `${today}_${user.code}`;
                    let data = { [field]: now.toISOString(), updated_at: now.toISOString() };
                    
                    if(field === 'clock_in') {
                        data.empCode = user.code; data.empName = user.name; data.date = today;
                        // Semak Lewat (> 8:15 AM)
                        data.isLate = (now.getHours() > 8 || (now.getHours() === 8 && now.getMinutes() > 15));
                        data.appealStatus = 'None'; data.appealReason = '';
                    }

                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', recordId), data, {merge:true});
                        showToast(`Berjaya rekod: ${actionLabels[field]}`, 'success');
                    } catch(e) { showToast('Ralat sambungan.', 'error'); }
                };

                const submitAppeal = async () => {
                    if(!appealReason.trim()) return showToast("Sila masukkan alasan munasabah.", "error");
                    const recordId = `${today}_${user.code}`;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', recordId), { appealStatus: 'Pending', appealReason });
                    showToast("Rayuan telah dihantar kepada Admin.", "success");
                    setAppealReason('');
                };

                const actionLabels = { clock_in: 'Masuk', break_start: 'Rehat Keluar', break_end: 'Rehat Masuk', clock_out: 'Balik', ot_start: 'OT Masuk', ot_end: 'OT Keluar' };

                const renderPunchButton = (field, label, dependsOn, mustBeNull, colorClass) => {
                    const isDone = !!myAtt[field];
                    const isDisabled = isDone || (dependsOn && !myAtt[dependsOn]) || (mustBeNull && !!myAtt[mustBeNull]);
                    
                    return (
                        <button disabled={isDisabled} onClick={() => verifyLocationAndExecute(label, () => punch(field))} 
                            className={`p-4 rounded-2xl flex flex-col items-center justify-center gap-2 transition-all duration-300 shadow-sm border ${isDisabled ? 'bg-slate-50 text-slate-400 border-slate-100 cursor-not-allowed' : `${colorClass} text-white border-transparent active:scale-95 shadow-md hover:shadow-lg`}`}>
                            <span className="font-bold text-xs uppercase tracking-wider">{label}</span>
                            <span className={`text-[11px] font-mono ${isDone ? 'bg-black/10 text-slate-600 px-2 py-0.5 rounded-md' : ''}`}>{isDone ? formatTimeDisplay(myAtt[field]) : '--:--'}</span>
                        </button>
                    );
                };

                // Paparan Pekerja Biasa
                if (!isAdmin) {
                    return (
                        <div className="space-y-6 max-w-3xl mx-auto">
                            {/* Modal GPS */}
                            {modalGps && (
                                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                    <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl animate-fade">
                                        {modalGps.type === 'loading' ? <div className="loader mx-auto mb-4 border-slate-200 border-t-blue-500"></div> : <Icons.MapPin className="mx-auto mb-4 text-rose-500 h-12 w-12"/>}
                                        <h3 className="font-bold text-lg mb-2 text-slate-800">{modalGps.type === 'loading' ? 'Mengesahkan Lokasi...' : 'Akses Ditolak'}</h3>
                                        <p className="text-sm text-slate-500 mb-6">{modalGps.msg}</p>
                                        {modalGps.type === 'error' && <button onClick={()=>setModalGps(null)} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">Tutup</button>}
                                    </div>
                                </div>
                            )}

                            {isOnLeave ? (
                                <div className="bg-amber-50 border border-amber-200 p-8 rounded-3xl text-center">
                                    <div className="text-4xl mb-4">🏖️</div><h2 className="text-xl font-black text-amber-800 mb-2">Selamat Bercuti!</h2>
                                    <p className="text-sm text-amber-600">Anda sedang bercuti hari ini. Fungsi Punch Card ditutup.</p>
                                </div>
                            ) : (
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <div className="text-center mb-6">
                                        <h2 className="text-xl font-bold text-slate-800">Punch Card Harian</h2>
                                        <p className="text-sm text-slate-500 mt-1">{new Date().toLocaleDateString('ms-MY', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</p>
                                        <div className="inline-block mt-3 px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-lg border border-blue-100">Waktu Balik Set: {settings.clockOutTime === '17:00' ? '5:00 PM' : '4:30 PM'}</div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                        {renderPunchButton('clock_in', 'Clock In', null, null, 'bg-emerald-500')}
                                        {renderPunchButton('break_start', 'Rehat Keluar', 'clock_in', 'clock_out', 'bg-amber-500')}
                                        {renderPunchButton('break_end', 'Rehat Masuk', 'break_start', 'clock_out', 'bg-sky-500')}
                                        {renderPunchButton('clock_out', 'Clock Out', 'clock_in', null, 'bg-rose-500')}
                                        {renderPunchButton('ot_start', 'OT Masuk', 'clock_out', null, 'bg-purple-500')}
                                        {renderPunchButton('ot_end', 'OT Keluar', 'ot_start', null, 'bg-indigo-500')}
                                    </div>

                                    {myAtt.isLate && (
                                        <div className="mt-8 p-5 bg-rose-50 border border-rose-200 rounded-2xl">
                                            <div className="flex items-center gap-2 text-rose-700 font-bold mb-2"><Icons.Alert/> Anda Rekod Masuk Lewat</div>
                                            <p className="text-xs text-rose-600 mb-4">Pemotongan gaji RM 5.00 akan dikenakan pada bulan ini. Jika anda mempunyai alasan kecemasan yang munasabah, sila hantar rayuan.</p>
                                            
                                            {myAtt.appealStatus === 'None' && (
                                                <div className="flex gap-2"><input type="text" value={appealReason} onChange={e=>setAppealReason(e.target.value)} placeholder="Tulis alasan di sini..." className="flex-1 text-sm p-2 rounded-lg border border-rose-200 outline-none"/><button onClick={submitAppeal} className="bg-rose-600 text-white px-4 py-2 rounded-lg font-bold text-sm">Hantar</button></div>
                                            )}
                                            {myAtt.appealStatus === 'Pending' && <div className="bg-white p-3 rounded-lg text-sm text-amber-600 font-bold border border-amber-200">⏳ Rayuan sedang diproses oleh Admin.</div>}
                                            {myAtt.appealStatus === 'Approved' && <div className="bg-white p-3 rounded-lg text-sm text-emerald-600 font-bold border border-emerald-200">✅ Rayuan Lulus. Tiada potongan RM5.</div>}
                                            {myAtt.appealStatus === 'Ditolak' && <div className="bg-white p-3 rounded-lg text-sm text-rose-700 font-bold border border-rose-200">❌ Rayuan Ditolak. Potongan RM5 dikekalkan.</div>}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Sejarah Sendiri */}
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-4 border-b bg-slate-50"><h3 className="font-bold text-slate-700">Sejarah Terkini</h3></div>
                                <div className="p-4 space-y-3">
                                    {attendances.filter(a => a.empCode === user.code).sort((a,b) => b.date.localeCompare(a.date)).slice(0,7).map(a => (
                                        <div key={a.id} className="flex justify-between items-center text-sm border-b pb-2 last:border-0 last:pb-0">
                                            <span className="font-medium text-slate-600">{a.date}</span>
                                            <div className="flex gap-3 text-xs font-mono">
                                                <span className="text-emerald-600">IN: {formatTimeDisplay(a.clock_in)}</span>
                                                <span className="text-rose-600">OUT: {formatTimeDisplay(a.clock_out)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );
                }

                // Paparan Admin
                const filteredAtt = attendances.filter(a => a.date === filterDate);
                return (
                    <div className="space-y-6">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border flex flex-wrap justify-between items-center gap-4">
                            <h2 className="font-bold text-lg text-slate-800">Senarai Kehadiran Harian</h2>
                            <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} className="p-2 border-2 border-slate-200 rounded-lg font-medium outline-none focus:border-blue-500" />
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm border overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase border-b">
                                    <tr><th className="p-4">Pekerja</th><th className="p-4 text-center">Masuk</th><th className="p-4 text-center">Rehat (Out/In)</th><th className="p-4 text-center">Balik</th><th className="p-4 text-center">OT (In/Out)</th><th className="p-4">Status & Tindakan</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredAtt.length === 0 ? <tr><td colSpan="6" className="p-8 text-center text-slate-400">Tiada rekod pada tarikh ini.</td></tr> : 
                                    filteredAtt.map(a => (
                                        <tr key={a.id} className="hover:bg-slate-50">
                                            <td className="p-4 font-bold text-slate-700">{a.empName}</td>
                                            <td className="p-4 text-center"><span className="text-emerald-600 font-mono bg-emerald-50 px-2 py-1 rounded">{formatTimeDisplay(a.clock_in)}</span></td>
                                            <td className="p-4 text-center text-xs text-slate-500 font-mono">{formatTimeDisplay(a.break_start)} - {formatTimeDisplay(a.break_end)}</td>
                                            <td className="p-4 text-center"><span className="text-rose-600 font-mono bg-rose-50 px-2 py-1 rounded">{formatTimeDisplay(a.clock_out)}</span></td>
                                            <td className="p-4 text-center text-xs text-purple-600 font-mono">{formatTimeDisplay(a.ot_start)} - {formatTimeDisplay(a.ot_end)}</td>
                                            <td className="p-4">
                                                {!a.isLate ? <span className="text-xs font-bold text-emerald-600 px-2 py-1 bg-emerald-100 rounded">On Time</span> : 
                                                    <div>
                                                        <span className="text-xs font-bold text-rose-600 px-2 py-1 bg-rose-100 rounded mb-1 inline-block">Lewat (Denda RM5)</span>
                                                        {a.appealStatus === 'Pending' && (
                                                            <div className="mt-1 flex items-center gap-1">
                                                                <button onClick={()=>updateDoc(doc(db,'artifacts',appId,'public','data','attendance',a.id),{appealStatus:'Approved'})} className="px-2 py-1 bg-emerald-500 text-white text-[10px] font-bold rounded">LULUS</button>
                                                                <button onClick={()=>updateDoc(doc(db,'artifacts',appId,'public','data','attendance',a.id),{appealStatus:'Ditolak'})} className="px-2 py-1 bg-rose-500 text-white text-[10px] font-bold rounded">TOLAK</button>
                                                                <span className="text-[10px] text-slate-500 italic max-w-[100px] truncate" title={a.appealReason}>{a.appealReason}</span>
                                                            </div>
                                                        )}
                                                        {a.appealStatus === 'Approved' && <div className="text-[10px] text-emerald-600 font-bold mt-1">Rayuan Diterima (Tiada Potongan)</div>}
                                                        {a.appealStatus === 'Ditolak' && <div className="text-[10px] text-rose-600 font-bold mt-1">Rayuan Ditolak</div>}
                                                    </div>
                                                }
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // MODUL 2: CUTI
            // ==========================================
            function ModuleLeaves({ user, leaves, employees, db, appId, showToast }) {
                const isAdmin = user.code === 'ADMIN';
                const [form, setForm] = useState({ type: 'Cuti Bergaji', startDate: '', endDate: '', reason: '' });

                const submitForm = async (e) => {
                    e.preventDefault();
                    if(form.startDate > form.endDate) return showToast("Tarikh Mula tidak boleh melebihi Tarikh Tamat", "error");
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leaves'), { ...form, empCode: user.code, empName: user.name, status: 'Menunggu', appliedAt: new Date().toISOString() });
                        setForm({ type: 'Cuti Bergaji', startDate: '', endDate: '', reason: '' });
                        showToast("Permohonan Cuti Dihantar!", "success");
                    } catch(err) { showToast("Ralat.", "error"); }
                };

                const updateStatus = async (id, status) => {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leaves', id), { status });
                    showToast(`Status ditukar ke ${status}`, "success");
                };

                const myLeaves = isAdmin ? leaves : leaves.filter(l => l.empCode === user.code);
                myLeaves.sort((a,b) => b.appliedAt.localeCompare(a.appliedAt));

                return (
                    <div className="space-y-6 max-w-5xl mx-auto">
                        {!isAdmin && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <h2 className="text-lg font-bold text-slate-800 mb-4">Mohon Cuti Baru</h2>
                                <form onSubmit={submitForm} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Jenis Cuti</label>
                                        <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} className="w-full p-3 bg-slate-50 border-2 rounded-xl outline-none focus:border-blue-500 font-bold"><option>Cuti Bergaji</option><option>Cuti Tanpa Gaji</option><option>Cuti Sakit (MC)</option><option>Cuti Kecemasan</option></select>
                                    </div>
                                    <div><label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Dari Tarikh</label><input type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})} required className="w-full p-3 bg-slate-50 border-2 rounded-xl outline-none focus:border-blue-500 font-bold"/></div>
                                    <div><label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Hingga Tarikh</label><input type="date" value={form.endDate} onChange={e=>setForm({...form,endDate:e.target.value})} required className="w-full p-3 bg-slate-50 border-2 rounded-xl outline-none focus:border-blue-500 font-bold"/></div>
                                    <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Sebab</label><textarea value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})} required placeholder="Nyatakan sebab..." className="w-full p-3 bg-slate-50 border-2 rounded-xl outline-none focus:border-blue-500 h-20 resize-none"></textarea></div>
                                    <div className="md:col-span-2"><button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">Hantar Permohonan</button></div>
                                </form>
                            </div>
                        )}

                        <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b"><h3 className="font-bold text-slate-700">Rekod & Status Permohonan Cuti</h3></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="text-xs text-slate-500 uppercase border-b"><tr>{isAdmin && <th className="p-4">Pekerja</th>}<th className="p-4">Jenis</th><th className="p-4">Tarikh</th><th className="p-4">Sebab</th><th className="p-4">Status</th>{isAdmin && <th className="p-4 text-right">Tindakan</th>}</tr></thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {myLeaves.length === 0 ? <tr><td colSpan="6" className="p-8 text-center text-slate-400">Tiada rekod permohonan.</td></tr> : 
                                        myLeaves.map(l => (
                                            <tr key={l.id} className="hover:bg-slate-50">
                                                {isAdmin && <td className="p-4 font-bold text-slate-700">{l.empName}</td>}
                                                <td className="p-4 font-medium">{l.type}</td>
                                                <td className="p-4 font-mono text-xs">{l.startDate} <span className="text-slate-400">hingga</span> {l.endDate}</td>
                                                <td className="p-4 text-slate-500 text-xs max-w-[200px] truncate" title={l.reason}>{l.reason}</td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase ${l.status==='Lulus'?'bg-emerald-100 text-emerald-700':l.status==='Ditolak'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}`}>{l.status}</span>
                                                </td>
                                                {isAdmin && (
                                                    <td className="p-4 text-right">
                                                        {l.status === 'Menunggu' && (
                                                            <div className="flex justify-end gap-1">
                                                                <button onClick={()=>updateStatus(l.id, 'Lulus')} className="p-1.5 bg-emerald-500 text-white rounded hover:bg-emerald-600"><Icons.Check/></button>
                                                                <button onClick={()=>updateStatus(l.id, 'Ditolak')} className="p-1.5 bg-rose-500 text-white rounded hover:bg-rose-600"><Icons.Alert/></button>
                                                            </div>
                                                        )}
                                                        {l.status !== 'Menunggu' && <button onClick={async()=>{if(confirm("Padam?"))await deleteDoc(doc(db,'artifacts',appId,'public','data','leaves',l.id));}} className="p-1.5 bg-slate-200 text-slate-600 rounded hover:bg-rose-500 hover:text-white transition"><Icons.Trash/></button>}
                                                    </td>
                                                )}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // MODUL 3: GAJI & SLIP
            // ==========================================
            function ModuleSalary({ attendances, leaves, salaries, employees, db, appId, showToast }) {
                const [year, setYear] = useState(new Date().getFullYear().toString());
                const [month, setMonth] = useState((new Date().getMonth() + 1).toString());
                const [modalForm, setModalForm] = useState(null); // { mode: 'add'/'edit', data: {} }
                const [showReport, setShowReport] = useState(false);
                
                const filteredSalaries = salaries.filter(s => s.year === year && s.month === month);

                const getDefaultsFromEmp = (empCode) => {
                    const emp = employees.find(e => e.code === empCode);
                    if(!emp) return {};
                    
                    // Auto-kira potongan lewat & Cuti (berdasarkan bulan dipilih)
                    let lateCount = 0; let unpaidCount = 0;
                    attendances.forEach(a => { if(a.empCode === empCode && a.isLate && a.appealStatus !== 'Approved' && a.date.startsWith(`${year}-${month.padStart(2,'0')}`)) lateCount++; });
                    leaves.forEach(l => { if(l.empCode === empCode && l.status === 'Lulus' && l.type === 'Cuti Tanpa Gaji' && l.startDate.startsWith(`${year}-${month.padStart(2,'0')}`)) {
                        const s = new Date(l.startDate); const e = new Date(l.endDate);
                        unpaidCount += Math.round((e-s)/(1000*60*60*24)) + 1;
                    }});
                    
                    const basic = emp.basic || 0;
                    const dailyRate = basic / 26;
                    const unpaidDeduct = dailyRate * unpaidCount;
                    const lateDeduct = lateCount * 5;
                    const kwsp = basic * 0.11; // Contoh kiraan kasar 11%

                    return { basic_salary: basic, unpaid_leave_days: unpaidCount, unpaid_leave_deduction: parseFloat(unpaidDeduct.toFixed(2)), late_deduction: lateDeduct, kwsp: parseFloat(kwsp.toFixed(2)), allowance:0, ot_hours:0, ot_rate:10, bonus:0, advance_payment:0, socso:0, eis:0, other_deductions:0 };
                };

                const openAdd = () => setModalForm({ mode: 'add', data: { empCode: employees.find(e=>e.code!=='ADMIN')?.code, ...getDefaultsFromEmp(employees.find(e=>e.code!=='ADMIN')?.code) } });
                const openEdit = (sal) => setModalForm({ mode: 'edit', data: { ...sal } });
                const closeM = () => setModalForm(null);

                const handleFormChange = (e, field) => {
                    let val = e.target.value;
                    const newData = { ...modalForm.data, [field]: val };
                    
                    if (field === 'empCode' && modalForm.mode === 'add') {
                        Object.assign(newData, getDefaultsFromEmp(val));
                    }
                    if (field === 'basic_salary' || field === 'unpaid_leave_days') {
                        const b = parseFloat(newData.basic_salary) || 0;
                        const d = parseInt(newData.unpaid_leave_days) || 0;
                        newData.unpaid_leave_deduction = parseFloat(((b / 26) * d).toFixed(2));
                    }
                    setModalForm({ ...modalForm, data: newData });
                };

                const saveSalary = async (e) => {
                    e.preventDefault(); const d = modalForm.data;
                    const emp = employees.find(x => x.code === d.empCode);
                    const recordId = modalForm.mode === 'edit' ? d.id : `sal_${d.empCode}_${year}_${month}`;
                    
                    const finalData = {
                        empCode: d.empCode, empName: emp.name, icNumber: emp.ic || '', year, month,
                        basic_salary: parseFloat(d.basic_salary)||0, allowance: parseFloat(d.allowance)||0, ot_hours: parseFloat(d.ot_hours)||0, ot_rate: parseFloat(d.ot_rate)||0, bonus: parseFloat(d.bonus)||0, advance_payment: parseFloat(d.advance_payment)||0,
                        kwsp: parseFloat(d.kwsp)||0, socso: parseFloat(d.socso)||0, eis: parseFloat(d.eis)||0, other_deductions: parseFloat(d.other_deductions)||0, late_deduction: parseFloat(d.late_deduction)||0,
                        unpaid_leave_days: parseInt(d.unpaid_leave_days)||0, unpaid_leave_deduction: parseFloat(d.unpaid_leave_deduction)||0,
                        updatedAt: new Date().toISOString()
                    };

                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'salaries', recordId), finalData, {merge:true});
                    showToast('Rekod Gaji Disimpan!', 'success'); closeM();
                };

                const importPukal = async () => {
                    if(!confirm(`Bina rekod gaji pukal untuk bulan ${MONTHS[parseInt(month)]} ${year}?`)) return;
                    showToast('Membina rekod...', 'info');
                    for (const emp of employees.filter(e => e.code !== 'ADMIN')) {
                        const id = `sal_${emp.code}_${year}_${month}`;
                        const def = getDefaultsFromEmp(emp.code);
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'salaries', id), { empCode: emp.code, empName: emp.name, icNumber: emp.ic||'', year, month, ...def, updatedAt: new Date().toISOString() }, {merge:true});
                    }
                    showToast('Selesai dibina!', 'success');
                };

                const importFeb2026Data = async () => {
                    if(!confirm("Anda pasti mahu import data Gaji Februari 2026 yang spesifik? Ini akan merekodkan data khusus ke dalam bulan Februari.")) return;
                    showToast('Memuat naik data Februari 2026...', 'info');
                    
                    const febData = [
                        { empCode: 'MZBE012024', advance_payment: 700, kwsp: 198, basic_salary: 1800 },
                        { empCode: 'MZBE092022', advance_payment: 800, kwsp: 231, basic_salary: 2100 },
                        { empCode: 'MZBE102022', advance_payment: 800, kwsp: 220, basic_salary: 2000 },
                        { empCode: 'MZBE072022', advance_payment: 1000, kwsp: 253, basic_salary: 2300 },
                        { empCode: 'MZBE022024', advance_payment: 0, kwsp: 198, basic_salary: 1800 },
                        { empCode: 'MZBE082022', advance_payment: 1000, kwsp: 253, unpaid_leave_days: 4, unpaid_leave_deduction: 353.84, basic_salary: 2300 },
                        { empCode: 'MZBE022025', advance_payment: 700, kwsp: 187, basic_salary: 1700 },
                        { empCode: 'MZBE032025', advance_payment: 700, kwsp: 187, basic_salary: 1700 },
                        { empCode: 'MZBE042025', advance_payment: 0, kwsp: 187, unpaid_leave_days: 12, unpaid_leave_deduction: 784.80, basic_salary: 1700 },
                        { empCode: 'MZBEBOSS001', advance_payment: 0, kwsp: 352, basic_salary: 3500 }
                    ];
                    
                    for (const data of febData) {
                        const emp = employees.find(e => e.code === data.empCode) || { name: 'Pekerja Tidak Diketahui', ic: '' };
                        const recordId = `sal_${data.empCode}_2026_2`;
                        
                        const finalData = {
                            empCode: data.empCode,
                            empName: emp.name,
                            icNumber: emp.ic || '',
                            year: '2026',
                            month: '2',
                            basic_salary: data.basic_salary || 0,
                            allowance: 0,
                            ot_hours: 0,
                            ot_rate: 10,
                            bonus: 0,
                            advance_payment: data.advance_payment || 0,
                            kwsp: data.kwsp || 0,
                            socso: 0,
                            eis: 0,
                            other_deductions: 0,
                            late_deduction: 0, // Denda lewat auto-kira tidak dimasukkan untuk elak kacau data lepas
                            unpaid_leave_days: data.unpaid_leave_days || 0,
                            unpaid_leave_deduction: data.unpaid_leave_deduction || 0,
                            updatedAt: new Date().toISOString()
                        };

                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'salaries', recordId), finalData, {merge:true});
                    }
                    showToast('Data gaji Februari 2026 berjaya diimport!', 'success');
                    setYear('2026');
                    setMonth('2');
                };

                const printSlip = (sal) => {
                    const gross = sal.basic_salary + sal.allowance + (sal.ot_hours*sal.ot_rate) + sal.bonus;
                    const deduct = sal.kwsp + sal.socso + sal.eis + sal.other_deductions + sal.unpaid_leave_deduction + sal.late_deduction + sal.advance_payment;
                    const html = `<html><head><title>Slip Gaji</title><style>body{font-family:sans-serif;padding:40px;color:#333;line-height:1.6} .row{display:flex;justify-content:space-between;border-bottom:1px dashed #ccc;padding:5px 0}</style></head><body><h2 style="text-align:center">MUIZ BANNER EMPIRE<br><small style="color:#666">Slip Gaji ${MONTHS[parseInt(sal.month)]} ${sal.year}</small></h2><p><b>Nama:</b> ${sal.empName}<br><b>IC:</b> ${sal.icNumber||'-'}</p><div style="display:flex;gap:20px"><div style="flex:1"><h3>Pendapatan</h3><div class="row"><span>Gaji Asas</span><span>RM ${sal.basic_salary.toFixed(2)}</span></div><div class="row"><span>Elaun/Bonus</span><span>RM ${(sal.allowance+sal.bonus).toFixed(2)}</span></div><div class="row"><span>OT</span><span>RM ${(sal.ot_hours*sal.ot_rate).toFixed(2)}</span></div><br><div class="row"><b>Jumlah Kasar</b><b>RM ${gross.toFixed(2)}</b></div></div><div style="flex:1"><h3>Potongan</h3><div class="row"><span>KWSP/SOCSO/EIS</span><span>RM ${(sal.kwsp+sal.socso+sal.eis).toFixed(2)}</span></div><div class="row"><span>Cuti Tanpa Gaji</span><span>RM ${sal.unpaid_leave_deduction.toFixed(2)}</span></div><div class="row"><span>Denda Lewat</span><span>RM ${sal.late_deduction.toFixed(2)}</span></div><div class="row"><span>Advance/Lain</span><span>RM ${(sal.advance_payment+sal.other_deductions).toFixed(2)}</span></div><br><div class="row"><b>Jumlah Potongan</b><b>RM ${deduct.toFixed(2)}</b></div></div></div><h2 style="text-align:center;margin-top:40px;background:#eee;padding:15px">GAJI BERSIH: RM ${(gross-deduct).toFixed(2)}</h2></body></html>`;
                    const w = window.open('','_blank'); w.document.write(html); w.document.close(); setTimeout(()=>w.print(), 500);
                };

                return (
                    <div className="space-y-6">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border flex flex-wrap items-center justify-between gap-4">
                            <div className="flex gap-2">
                                <select value={year} onChange={e=>setYear(e.target.value)} className="p-2 border rounded-lg outline-none font-bold bg-slate-50"><option>2024</option><option>2025</option><option>2026</option></select>
                                <select value={month} onChange={e=>setMonth(e.target.value)} className="p-2 border rounded-lg outline-none font-bold bg-slate-50">{MONTHS.map((m,i)=> i>0 && <option key={i} value={i.toString()}>{m}</option>)}</select>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <button onClick={()=>setShowReport(true)} className="px-4 py-2 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-900 transition flex items-center gap-2"><Icons.ChartBar/> Analisa</button>
                                <button onClick={importFeb2026Data} className="px-4 py-2 bg-blue-50 text-blue-600 font-bold rounded-lg hover:bg-blue-100 transition">📥 Data Feb 2026</button>
                                <button onClick={importPukal} className="px-4 py-2 bg-amber-50 text-amber-600 font-bold rounded-lg hover:bg-amber-100 transition">📥 Bina Pukal (Auto)</button>
                                <button onClick={openAdd} className="px-4 py-2 bg-emerald-50 text-emerald-600 font-bold rounded-lg hover:bg-emerald-100 transition">➕ Tambah Manual</button>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredSalaries.length === 0 ? <div className="col-span-full text-center py-10 text-slate-400">Tiada rekod gaji untuk bulan ini. Tekan "Bina Pukal" untuk jana secara automatik.</div> : 
                            filteredSalaries.map(s => {
                                const gross = s.basic_salary + s.allowance + (s.ot_hours*s.ot_rate) + s.bonus;
                                const deduct = s.kwsp + s.socso + s.eis + s.other_deductions + s.unpaid_leave_deduction + s.late_deduction + s.advance_payment;
                                const net = gross - deduct;
                                return (
                                    <div key={s.id} className="bg-white p-5 rounded-2xl shadow-sm border relative">
                                        <div className="flex justify-between items-start mb-4"><h3 className="font-bold text-slate-800 uppercase text-sm leading-tight pr-2">{s.empName}</h3><button onClick={()=>printSlip(s)} className="text-blue-500 hover:text-blue-700 p-1 bg-blue-50 rounded"><svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg></button></div>
                                        <div className="bg-emerald-50 p-3 rounded-xl mb-4 text-center border border-emerald-100"><p className="text-[10px] text-emerald-600 font-bold uppercase tracking-wider">Gaji Bersih</p><p className="text-2xl font-black text-emerald-700">RM {net.toLocaleString('ms-MY',{minimumFractionDigits:2})}</p></div>
                                        <div className="flex justify-between text-xs text-slate-500 mb-4 px-1"><span>Kasar: RM {gross.toFixed(2)}</span><span className="text-rose-500">Tolak: RM {deduct.toFixed(2)}</span></div>
                                        <div className="grid grid-cols-2 gap-2 mt-4"><button onClick={()=>openEdit(s)} className="py-2 bg-slate-100 rounded-lg text-xs font-bold hover:bg-slate-200 text-slate-700">Edit</button><button onClick={async()=>{if(confirm("Padam?"))await deleteDoc(doc(db,'artifacts',appId,'public','data','salaries',s.id));}} className="py-2 bg-rose-50 text-rose-600 rounded-lg text-xs font-bold hover:bg-rose-100">Padam</button></div>
                                    </div>
                                )
                            })}
                        </div>

                        {modalForm && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto animate-fade shadow-2xl">
                                    <div className="sticky top-0 bg-white px-6 py-4 border-b flex justify-between items-center z-10"><h2 className="font-bold text-lg text-slate-800">{modalForm.mode==='add'?'Tambah':'Edit'} Gaji</h2><button type="button" onClick={closeM} className="p-2 bg-slate-100 rounded-full text-slate-600">✕</button></div>
                                    <form onSubmit={saveSalary} className="p-6 space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {modalForm.mode === 'add' && <div><label className="text-xs font-bold text-slate-500 block mb-1">Pekerja</label><select className="w-full p-2 border rounded outline-none font-bold bg-slate-50" value={modalForm.data.empCode} onChange={e=>handleFormChange(e, 'empCode')}>{employees.filter(e=>e.code!=='ADMIN').map(e=><option key={e.code} value={e.code}>{e.name}</option>)}</select></div>}
                                            <div className="col-span-full"><h3 className="bg-slate-100 p-2 rounded text-sm font-bold mt-2">💰 Pendapatan</h3></div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 block">Gaji Asas (RM)</label>
                                                <input type="number" step="0.01" className="w-full p-2 border rounded font-bold" value={modalForm.data.basic_salary} onChange={e=>handleFormChange(e, 'basic_salary')} required/>
                                                <p className="text-[10px] text-blue-600 font-bold mt-1">Kadar Sehari: RM {(parseFloat(modalForm.data.basic_salary||0)/26).toFixed(2)}</p>
                                            </div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Elaun / Bonus (RM)</label><input type="number" step="0.01" className="w-full p-2 border rounded" value={modalForm.data.allowance} onChange={e=>handleFormChange(e, 'allowance')}/></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Jam OT</label><input type="number" step="0.5" className="w-full p-2 border rounded" value={modalForm.data.ot_hours} onChange={e=>handleFormChange(e, 'ot_hours')}/></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Kadar OT (RM/jam)</label><input type="number" step="0.01" className="w-full p-2 border rounded" value={modalForm.data.ot_rate} onChange={e=>handleFormChange(e, 'ot_rate')}/></div>
                                            
                                            <div className="col-span-full"><h3 className="bg-slate-100 p-2 rounded text-sm font-bold mt-2">📉 Potongan & Penalti</h3></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">KWSP (RM)</label><input type="number" step="0.01" className="w-full p-2 border rounded" value={modalForm.data.kwsp} onChange={e=>handleFormChange(e, 'kwsp')}/></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Advance (RM)</label><input type="number" step="0.01" className="w-full p-2 border rounded text-rose-600 bg-rose-50" value={modalForm.data.advance_payment} onChange={e=>handleFormChange(e, 'advance_payment')}/></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Lain-lain (SOCSO/EIS) (RM)</label><input type="number" step="0.01" className="w-full p-2 border rounded text-rose-600 bg-rose-50" value={modalForm.data.other_deductions} onChange={e=>handleFormChange(e, 'other_deductions')}/></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Denda Lewat (RM)</label><input type="number" step="0.01" className="w-full p-2 border rounded text-rose-600 bg-rose-50 font-bold" value={modalForm.data.late_deduction} onChange={e=>handleFormChange(e, 'late_deduction')}/></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Hari Cuti Tanpa Gaji</label><input type="number" min="0" className="w-full p-2 border rounded bg-slate-50" value={modalForm.data.unpaid_leave_days} onChange={e=>handleFormChange(e, 'unpaid_leave_days')}/></div>
                                            <div><label className="text-xs font-bold text-slate-500 block">Potongan Cuti (RM) - Auto</label><input type="number" step="0.01" readOnly className="w-full p-2 border rounded text-rose-600 bg-slate-100 font-bold cursor-not-allowed" value={modalForm.data.unpaid_leave_deduction} /></div>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition">Simpan Rekod Gaji</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Modal Laporan Analisa */}
                        {showReport && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-y-auto animate-fade shadow-2xl p-6">
                                    <div className="flex justify-between items-center mb-6"><h2 className="font-black text-2xl text-slate-800">📊 Laporan {year}</h2><button onClick={()=>setShowReport(false)} className="p-2 bg-slate-100 rounded-full">✕</button></div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                        <div className="bg-blue-50 p-4 rounded-xl"><p className="text-[10px] font-bold text-blue-600 uppercase">J. Kasar Setahun</p><p className="text-lg font-black">RM {salaries.filter(s=>s.year===year).reduce((sum,s)=>sum+(s.basic_salary||0)+(s.allowance||0)+((s.ot_hours||0)*(s.ot_rate||0)),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p></div>
                                        <div className="bg-emerald-50 p-4 rounded-xl"><p className="text-[10px] font-bold text-emerald-600 uppercase">J. Bersih Setahun</p><p className="text-lg font-black">RM {salaries.filter(s=>s.year===year).reduce((sum,s)=>sum+((s.basic_salary||0)+(s.allowance||0)+((s.ot_hours||0)*(s.ot_rate||0))-((s.kwsp||0)+(s.socso||0)+(s.eis||0)+(s.other_deductions||0)+(s.unpaid_leave_deduction||0)+(s.advance_payment||0)+(s.late_deduction||0))),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p></div>
                                        <div className="bg-rose-50 p-4 rounded-xl"><p className="text-[10px] font-bold text-rose-600 uppercase">J. Potongan KWSP</p><p className="text-lg font-black">RM {salaries.filter(s=>s.year===year).reduce((sum,s)=>sum+(s.kwsp||0),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p></div>
                                        <div className="bg-amber-50 p-4 rounded-xl"><p className="text-[10px] font-bold text-amber-600 uppercase">J. Bayaran OT</p><p className="text-lg font-black">RM {salaries.filter(s=>s.year===year).reduce((sum,s)=>sum+((s.ot_hours||0)*(s.ot_rate||0)),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p></div>
                                    </div>
                                    <p className="text-sm text-center text-slate-500 italic">Gunakan sistem luaran untuk cetakan terperinci.</p>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // ==========================================
            // MODUL 4: ADMIN TETAPAN (URUS PEKERJA)
            // ==========================================
            function ModuleAdmin({ employees, settings, db, appId, showToast }) {
                const [empForm, setEmpForm] = useState(null);

                const saveSettings = async (time, bypass) => {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { clockOutTime: time, bypassGps: bypass }, {merge:true});
                    showToast("Tetapan dikemaskini", "success");
                };

                const saveEmp = async (e) => {
                    e.preventDefault();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', empForm.code.toUpperCase()), { ...empForm, code: empForm.code.toUpperCase(), basic: parseFloat(empForm.basic)||0 }, {merge:true});
                    showToast("Profil Pekerja Disimpan", "success"); setEmpForm(null);
                };

                return (
                    <div className="space-y-6 max-w-4xl mx-auto">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border space-y-6">
                            <h2 className="font-bold text-lg flex items-center gap-2"><Icons.Settings/> Tetapan Sistem</h2>
                            <div className="grid md:grid-cols-2 gap-4">
                                <div className="p-4 bg-slate-50 rounded-xl border border-slate-200">
                                    <p className="font-bold text-slate-800 text-sm mb-1">Waktu Balik Rasmi</p>
                                    <p className="text-xs text-slate-500 mb-3">Waktu minimum untuk Clock Out.</p>
                                    <select value={settings.clockOutTime} onChange={e=>saveSettings(e.target.value, settings.bypassGps)} className="w-full p-2 font-bold bg-white border rounded-lg outline-none focus:border-blue-500"><option value="16:30">4:30 PM</option><option value="17:00">5:00 PM</option></select>
                                </div>
                                <div className="p-4 bg-slate-50 rounded-xl border border-slate-200">
                                    <p className="font-bold text-slate-800 text-sm mb-1">Bypass GPS</p>
                                    <p className="text-xs text-slate-500 mb-3">Benarkan pekerja Clock In tanpa sah lokasi.</p>
                                    <button onClick={()=>saveSettings(settings.clockOutTime, !settings.bypassGps)} className={`w-full py-2 rounded-lg font-bold text-sm transition ${settings.bypassGps ? 'bg-rose-500 text-white' : 'bg-slate-200 text-slate-600'}`}>{settings.bypassGps ? 'GPS DIBENARKAN (Aktif)' : 'GPS DIWAJIBKAN (Mati)'}</button>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b flex justify-between items-center"><h3 className="font-bold text-slate-700">Senarai Pekerja</h3><button onClick={()=>setEmpForm({code:'',name:'',dept:'',position:'',basic:0,ic:''})} className="px-3 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-lg shadow-sm hover:bg-blue-700">+ Tambah Pekerja</button></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-white text-xs text-slate-500 uppercase border-b"><tr><th className="p-4">Kod Login</th><th className="p-4">Nama</th><th className="p-4">Jawatan</th><th className="p-4">Gaji Asas</th><th className="p-4">Tindakan</th></tr></thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {employees.map(e => (
                                            <tr key={e.code} className="hover:bg-slate-50">
                                                <td className="p-4 font-mono font-bold text-slate-600">{e.code}</td>
                                                <td className="p-4 font-bold">{e.name}</td>
                                                <td className="p-4 text-xs">{e.position} ({e.dept})</td>
                                                <td className="p-4 text-emerald-600 font-bold">RM {e.basic}</td>
                                                <td className="p-4 flex gap-2">
                                                    <button onClick={()=>setEmpForm(e)} className="px-3 py-1 bg-slate-200 hover:bg-slate-300 rounded text-xs font-bold text-slate-700">Edit</button>
                                                    {e.code !== 'ADMIN' && <button onClick={async()=>{if(confirm("Padam pekerja ini?"))await deleteDoc(doc(db,'artifacts',appId,'public','data','employees',e.code));}} className="px-3 py-1 bg-rose-50 hover:bg-rose-100 rounded text-xs font-bold text-rose-600">Padam</button>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {empForm && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-fade">
                                    <h2 className="font-black text-xl mb-4 border-b pb-2 text-slate-800">Profil Pekerja</h2>
                                    <form onSubmit={saveEmp} className="space-y-4">
                                        <div><label className="text-xs font-bold text-slate-600">Kod Login (Unik)</label><input type="text" disabled={empForm.code !== '' && employees.some(e=>e.code===empForm.code)} value={empForm.code} onChange={e=>setEmpForm({...empForm,code:e.target.value})} className="w-full p-2 border rounded uppercase bg-slate-50 font-mono focus:border-blue-500 outline-none" required/></div>
                                        <div><label className="text-xs font-bold text-slate-600">Nama Penuh</label><input type="text" value={empForm.name} onChange={e=>setEmpForm({...empForm,name:e.target.value})} className="w-full p-2 border rounded uppercase focus:border-blue-500 outline-none" required/></div>
                                        <div><label className="text-xs font-bold text-slate-600">No IC</label><input type="text" value={empForm.ic} onChange={e=>setEmpForm({...empForm,ic:e.target.value})} className="w-full p-2 border rounded focus:border-blue-500 outline-none"/></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-xs font-bold text-slate-600">Jabatan</label><input type="text" value={empForm.dept} onChange={e=>setEmpForm({...empForm,dept:e.target.value})} className="w-full p-2 border rounded focus:border-blue-500 outline-none" required/></div>
                                            <div><label className="text-xs font-bold text-slate-600">Jawatan</label><input type="text" value={empForm.position} onChange={e=>setEmpForm({...empForm,position:e.target.value})} className="w-full p-2 border rounded focus:border-blue-500 outline-none" required/></div>
                                        </div>
                                        <div><label className="text-xs font-bold text-emerald-600">Gaji Asas Bulanan (RM)</label><input type="number" step="0.01" value={empForm.basic} onChange={e=>setEmpForm({...empForm,basic:e.target.value})} className="w-full p-2 border-2 border-emerald-200 rounded outline-none focus:border-emerald-500 font-bold" required/></div>
                                        <div className="flex gap-2 pt-4"><button type="submit" className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow">Simpan</button><button type="button" onClick={()=>setEmpForm(null)} className="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-bold hover:bg-slate-200 transition">Batal</button></div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<MainApp />);
        }
    </script>
</body>
</html>
