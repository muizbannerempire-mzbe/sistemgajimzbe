<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Gaji - Muiz Banner Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div id="root"></div>

    <!-- Modul Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        window.fbModules = { initializeApp, getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <!-- Aplikasi React -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, Fragment } = React;

        // --- KONFIGURASI GLOBAL ---
        const APP_ID = 'sistemgajimzbe'; 
        const MONTHS = ['', 'Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];

        const DEFAULT_EMPLOYEES = [
            { code: 'MZBE012024', name: 'AHMAD BUKHARIE BIN FAIZAL NORHADI', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1800, ic: '040421110053' },
            { code: 'MZBE092022', name: 'AMMAR ZAKWAN BIN DAUD', dept: 'Operasi', position: 'Pengurus Order Luar', basic: 2100, ic: '980416036979' },
            { code: 'MZBE102022', name: 'ATHIRAH BINTI MOHD ZEIN', dept: 'Pengeluaran', position: 'Pegawai Operasi Pengeluaran', basic: 2000, ic: '000917110384' },
            { code: 'MZBE072022', name: 'NUR MAISARAH BINTI AHMAD RIZAL', dept: 'Operasi', position: 'Pengurus Shopee', basic: 2300, ic: '971017385034' },
            { code: 'MZBE022024', name: 'NURLAILI BINTI ZAHARI', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1800, ic: '' },
            { code: 'MZBE082022', name: 'WAN ADIB ASHRAF BIN AB WAHAB', dept: 'Operasi', position: 'Pengurus TikTok', basic: 2300, ic: '000417080975' },
            { code: 'MZBE022025', name: 'ABDUL RAHMAN BIN S. HAMID', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1700, ic: '070909030855' },
            { code: 'MZBE032025', name: 'MUHAMMAD AIMAN BIN MOHD ZULKIFLI', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1700, ic: '010815110403' },
            { code: 'MZBE042025', name: 'FATIN AMIERA BINTI RAZIHA', dept: 'Pemasaran', position: 'Pegawai Pemasaran', basic: 1700, ic: '930905115074' },
            { code: 'MZBEBOSS001', name: 'MUIZZUDDIN BIN AB.LLAH', dept: 'Pentadbiran', position: 'Pengurus Besar', basic: 3500, ic: '990331037699' },
            { code: 'ADMIN', name: 'SUPER ADMIN', dept: 'Pengurusan', position: 'Admin', basic: 0, ic: '' }
        ];

        // --- IKON TERBINA DALAM ---
        const IconLogOut = ({size=18, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconAlert = ({size=24, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
        const IconTrash = ({size=16, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconEdit = ({size=16, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconChartBar = ({size=20, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
        const IconPrinter = ({size=18, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconUsers = ({size=20, className=""}) => <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;

        // ==========================================
        // UI COMPONENTS
        // ==========================================
        function BrandLogo({ size = "large" }) {
            return (
                <div className={`flex flex-col items-center justify-center ${size === 'large' ? 'mb-8' : 'mb-0 shrink-0'}`}>
                    <img 
                        src="./logo.png" 
                        alt="MBE Logo" 
                        style={{ height: size === 'large' ? '90px' : '36px', width: 'auto', objectFit: 'contain' }} 
                        className={size === 'large' ? 'mb-4 shadow-xl rounded-full border-4 border-white bg-white' : 'shadow-sm rounded-full border-2 border-white bg-white'} 
                        onError={e => { e.target.onerror=null; e.target.src='https://ui-avatars.com/api/?name=MBE&background=1e293b&color=ffffff&rounded=true&bold=true'; }} 
                    />
                    {size === 'large' && <div className="text-center"><h1 className="text-2xl font-black text-slate-800 tracking-tight">MUIZ BANNER</h1><p className="text-xs font-bold text-blue-600 uppercase tracking-[0.3em] mt-1">Sistem Gaji</p></div>}
                </div>
            );
        }

        function TabBtn({ label, icon, active, onClick }) {
            return (
                <button onClick={onClick} className={`whitespace-nowrap px-4 py-3 font-bold text-sm border-b-2 transition-colors flex items-center gap-2 ${active ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}>
                    <span>{icon}</span> {label}
                </button>
            );
        }

        function LoginScreen({ employees, onLogin, isReady, showToast }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const cleanUser = username.trim().toUpperCase();
                
                if(cleanUser === 'ADMIN' && password === 'admin123') {
                    onLogin({ code: 'ADMIN', name: 'Administrator' }); return;
                }
                
                const emp = employees.find(e => (e?.code || '') === cleanUser);
                if(emp && password === emp.code) {
                    onLogin(emp);
                } else {
                    showToast("ID atau Kata Laluan tidak sah.", "error");
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-xl border border-slate-100 animate-fade">
                        <BrandLogo size="large" />
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Kod Pekerja</label>
                                <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none uppercase font-bold text-slate-700 transition" placeholder="Cth: MZBE012024 / ADMIN" required/>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Kata Laluan</label>
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none font-bold text-slate-700 transition" placeholder="Masukkan kata laluan" required/>
                            </div>
                            <button type="submit" disabled={!isReady} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-blue-700 transition disabled:opacity-50 flex justify-center items-center gap-2">
                                {!isReady && <div className="loader border-white border-t-blue-600 w-5 h-5"></div>}
                                {isReady ? 'Log Masuk Sistem' : 'Memuat Data...'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // MODUL 1: GAJI & SLIP (SISTEM UTAMA)
        // ==========================================
        function ModuleSalary({ user, salaries, employees, showToast, db }) {
            const isAdmin = user?.code === 'ADMIN';
            const [year, setYear] = useState(new Date().getFullYear().toString());
            const [month, setMonth] = useState((new Date().getMonth() + 1).toString());
            const [modalForm, setModalForm] = useState(null); 
            const [showReport, setShowReport] = useState(false);
            
            const filteredSalaries = salaries.filter(s => (s?.year || '') === year && (s?.month || '') === month && (isAdmin || s?.empCode === user.code));

            const getDefaultsFromEmp = (empCode) => {
                const emp = employees.find(e => (e?.code || '') === empCode);
                if(!emp) return {};
                
                const basic = emp.basic || 0;
                const kwsp = basic * 0.11; 

                return { 
                    basic_salary: basic, 
                    unpaid_leave_days: 0, 
                    unpaid_leave_deduction: 0, 
                    late_deduction: 0, 
                    kwsp: parseFloat(kwsp.toFixed(2)), 
                    allowance: 0, 
                    ot_hours: 0, 
                    ot_rate: 10, 
                    bonus: 0, 
                    advance_payment: 0, 
                    socso: 0, 
                    eis: 0, 
                    other_deductions: 0 
                };
            };

            const openAdd = () => {
                const firstEmpCode = employees.find(e=>(e?.code || '') !== 'ADMIN')?.code;
                setModalForm({ mode: 'add', data: { empCode: firstEmpCode, ...getDefaultsFromEmp(firstEmpCode) } });
            };
            const openEdit = (sal) => setModalForm({ mode: 'edit', data: { ...sal } });
            const closeM = () => setModalForm(null);

            const handleFormChange = (e, field) => {
                let val = e.target.value;
                const newData = { ...modalForm.data, [field]: val };
                
                if (field === 'empCode' && modalForm.mode === 'add') {
                    Object.assign(newData, getDefaultsFromEmp(val));
                }
                if (field === 'basic_salary' || field === 'unpaid_leave_days') {
                    const b = parseFloat(newData.basic_salary) || 0;
                    const d = parseInt(newData.unpaid_leave_days) || 0;
                    newData.unpaid_leave_deduction = parseFloat(((b / 26) * d).toFixed(2));
                }
                setModalForm({ ...modalForm, data: newData });
            };

            const saveSalary = async (e) => {
                e.preventDefault(); const d = modalForm.data;
                const emp = employees.find(x => (x?.code || '') === d.empCode);
                const recordId = modalForm.mode === 'edit' ? d.id : `sal_${d.empCode}_${year}_${month}`;
                
                const finalData = {
                    empCode: d.empCode, empName: emp?.name || '', icNumber: emp?.ic || '', dept: emp?.dept || '', position: emp?.position || '', year, month,
                    basic_salary: parseFloat(d.basic_salary)||0, allowance: parseFloat(d.allowance)||0, ot_hours: parseFloat(d.ot_hours)||0, ot_rate: parseFloat(d.ot_rate)||0, bonus: parseFloat(d.bonus)||0, advance_payment: parseFloat(d.advance_payment)||0,
                    kwsp: parseFloat(d.kwsp)||0, socso: parseFloat(d.socso)||0, eis: parseFloat(d.eis)||0, other_deductions: parseFloat(d.other_deductions)||0, late_deduction: parseFloat(d.late_deduction)||0,
                    unpaid_leave_days: parseInt(d.unpaid_leave_days)||0, unpaid_leave_deduction: parseFloat(d.unpaid_leave_deduction)||0,
                    updatedAt: new Date().toISOString()
                };

                try {
                    await window.fbModules.setDoc(window.fbModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'salaries', recordId), finalData, {merge:true});
                    showToast('Rekod Gaji Disimpan!', 'success'); 
                    closeM();
                } catch(err) {
                    showToast('Gagal menyimpan rekod. Sila periksa Rules Firebase.', 'error');
                }
            };

            const importPukal = async () => {
                if(!window.confirm(`Bina templat gaji kosong untuk bulan ${MONTHS[parseInt(month)]} ${year} bagi semua pekerja?`)) return;
                showToast('Membina rekod...', 'info');
                try {
                    for (const emp of employees.filter(e => (e?.code || '') !== 'ADMIN')) {
                        const id = `sal_${emp.code}_${year}_${month}`;
                        const def = getDefaultsFromEmp(emp.code);
                        await window.fbModules.setDoc(window.fbModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'salaries', id), { empCode: emp.code, empName: emp.name, icNumber: emp.ic||'', dept: emp.dept||'', position: emp.position||'', year, month, ...def, updatedAt: new Date().toISOString() }, {merge:true});
                    }
                    showToast('Selesai dibina!', 'success');
                } catch(err) {
                    showToast('Ralat membina rekod. Periksa Rules Firebase.', 'error');
                }
            };

            const importStandardData = async () => {
                if(!window.confirm(`Anda pasti mahu jana senarai pekerja & data gaji standard untuk bulan ${MONTHS[parseInt(month)]} ${year}?`)) return;
                showToast(`Menjana data gaji ${MONTHS[parseInt(month)]}...`, 'info');
                
                const standardData = [
                    { empCode: 'MZBE012024', name: 'AHMAD BUKHARIE BIN FAIZAL NORHADI', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '040421110053', advance_payment: 700, kwsp: 198, basic_salary: 1800 },
                    { empCode: 'MZBE092022', name: 'AMMAR ZAKWAN BIN DAUD', dept: 'Operasi', position: 'Pengurus Order Luar', ic: '980416036979', advance_payment: 800, kwsp: 231, basic_salary: 2100 },
                    { empCode: 'MZBE102022', name: 'ATHIRAH BINTI MOHD ZEIN', dept: 'Pengeluaran', position: 'Pegawai Operasi Pengeluaran', ic: '000917110384', advance_payment: 800, kwsp: 220, basic_salary: 2000 },
                    { empCode: 'MZBE072022', name: 'NUR MAISARAH BINTI AHMAD RIZAL', dept: 'Operasi', position: 'Pengurus Shopee', ic: '971017385034', advance_payment: 1000, kwsp: 253, basic_salary: 2300 },
                    { empCode: 'MZBE022024', name: 'NURLAILI BINTI ZAHARI', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '', advance_payment: 0, kwsp: 198, basic_salary: 1800 },
                    { empCode: 'MZBE082022', name: 'WAN ADIB ASHRAF BIN AB WAHAB', dept: 'Operasi', position: 'Pengurus TikTok', ic: '000417080975', advance_payment: 1000, kwsp: 253, unpaid_leave_days: 4, unpaid_leave_deduction: 353.84, basic_salary: 2300 },
                    { empCode: 'MZBE022025', name: 'ABDUL RAHMAN BIN S. HAMID', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '070909030855', advance_payment: 700, kwsp: 187, basic_salary: 1700 },
                    { empCode: 'MZBE032025', name: 'MUHAMMAD AIMAN BIN MOHD ZULKIFLI', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '010815110403', advance_payment: 700, kwsp: 187, basic_salary: 1700 },
                    { empCode: 'MZBE042025', name: 'FATIN AMIERA BINTI RAZIHA', dept: 'Pemasaran', position: 'Pegawai Pemasaran', ic: '930905115074', advance_payment: 0, kwsp: 187, unpaid_leave_days: 12, unpaid_leave_deduction: 784.80, basic_salary: 1700 },
                    { empCode: 'MZBEBOSS001', name: 'MUIZZUDDIN BIN AB.LLAH', dept: 'Pentadbiran', position: 'Pengurus Besar', ic: '990331037699', advance_payment: 0, kwsp: 352, basic_salary: 3500 }
                ];
                
                try {
                    for (const data of standardData) {
                        // 1. DAFTARKAN TERUS KE DALAM DIREKTORI PEKERJA
                        const empProfile = {
                            code: data.empCode,
                            name: data.name,
                            ic: data.ic,
                            dept: data.dept,
                            position: data.position,
                            basic: data.basic_salary
                        };
                        await window.fbModules.setDoc(window.fbModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', data.empCode), empProfile, {merge:true});

                        // 2. MASUKKAN REKOD GAJI
                        const recordId = `sal_${data.empCode}_${year}_${month}`;
                        const finalData = {
                            empCode: data.empCode,
                            empName: data.name,
                            icNumber: data.ic,
                            dept: data.dept,
                            position: data.position,
                            year: year,
                            month: month,
                            basic_salary: data.basic_salary || 0,
                            allowance: 0, ot_hours: 0, ot_rate: 10, bonus: 0,
                            advance_payment: data.advance_payment || 0,
                            kwsp: data.kwsp || 0, socso: 0, eis: 0, other_deductions: 0, late_deduction: 0,
                            unpaid_leave_days: data.unpaid_leave_days || 0,
                            unpaid_leave_deduction: data.unpaid_leave_deduction || 0,
                            updatedAt: new Date().toISOString()
                        };
                        await window.fbModules.setDoc(window.fbModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'salaries', recordId), finalData, {merge:true});
                    }
                    showToast(`Data gaji ${MONTHS[parseInt(month)]} ${year} berjaya dijana!`, 'success');
                } catch(err) {
                    console.warn(err);
                    showToast('Gagal memuat naik. Periksa Firebase Rules.', 'error');
                }
            };

            const deleteSalary = async (id) => {
                if(window.confirm("Padam rekod ini?")) {
                    try {
                        await window.fbModules.deleteDoc(window.fbModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'salaries', id));
                    } catch(e) {
                        showToast("Gagal memadam. Periksa Firebase Rules.", "error");
                    }
                }
            };

            const printSlip = (sal, empName, icNumber, dept, position) => {
                const gross = (sal?.basic_salary || 0) + (sal?.allowance || 0) + ((sal?.ot_hours || 0)*(sal?.ot_rate || 0)) + (sal?.bonus || 0);
                const deduct = (sal?.kwsp || 0) + (sal?.socso || 0) + (sal?.eis || 0) + (sal?.other_deductions || 0) + (sal?.unpaid_leave_deduction || 0) + (sal?.late_deduction || 0) + (sal?.advance_payment || 0);
                const html = `<html><head><title>Slip Gaji - ${empName}</title><style>body{font-family:sans-serif;padding:40px;color:#333;line-height:1.6} .row{display:flex;justify-content:space-between;border-bottom:1px dashed #ccc;padding:5px 0}</style></head><body><h2 style="text-align:center">MUIZ BANNER EMPIRE<br><small style="color:#666">Slip Gaji ${MONTHS[parseInt(sal.month)]} ${sal.year}</small></h2><div style="margin-bottom:30px; background:#f9f9f9; padding:15px; border-radius:8px;"><p style="margin:0; text-transform:uppercase;"><b>Nama:</b> ${empName}<br><b>No. KP:</b> ${icNumber||'-'}<br><b>Jabatan:</b> ${dept||'-'}<br><b>Jawatan:</b> ${position||'-'}</p></div><div style="display:flex;gap:30px"><div style="flex:1"><h3>Pendapatan</h3><div class="row"><span>Gaji Asas</span><span>RM ${(sal.basic_salary || 0).toFixed(2)}</span></div><div class="row"><span>Elaun/Bonus</span><span>RM ${((sal.allowance || 0)+(sal.bonus || 0)).toFixed(2)}</span></div><div class="row"><span>OT (${sal.ot_hours||0} jam)</span><span>RM ${((sal.ot_hours || 0)*(sal.ot_rate || 0)).toFixed(2)}</span></div><br><div class="row" style="border-top:2px solid #333; border-bottom:0; padding-top:10px;"><b>Jumlah Kasar</b><b>RM ${gross.toFixed(2)}</b></div></div><div style="flex:1"><h3>Potongan</h3><div class="row"><span>KWSP/SOCSO/EIS</span><span>RM ${((sal.kwsp || 0)+(sal.socso || 0)+(sal.eis || 0)).toFixed(2)}</span></div><div class="row"><span>Cuti Tanpa Gaji (${sal.unpaid_leave_days||0} hari)</span><span>RM ${(sal.unpaid_leave_deduction || 0).toFixed(2)}</span></div><div class="row"><span>Denda Lewat</span><span>RM ${(sal.late_deduction || 0).toFixed(2)}</span></div><div class="row"><span>Advance/Lain-lain</span><span>RM ${((sal.advance_payment || 0)+(sal.other_deductions || 0)).toFixed(2)}</span></div><br><div class="row" style="border-top:2px solid #333; border-bottom:0; padding-top:10px;"><b>Jumlah Potongan</b><b>RM ${deduct.toFixed(2)}</b></div></div></div><h2 style="text-align:center;margin-top:40px;background:#eef2ff;padding:20px;border-radius:8px;color:#1e40af;">GAJI BERSIH: RM ${(gross-deduct).toFixed(2)}</h2></body></html>`;
                const w = window.open('','_blank'); w.document.write(html); w.document.close(); setTimeout(()=>w.print(), 500);
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                        <div className="flex gap-2 w-full md:w-auto">
                            <select value={year} onChange={e=>setYear(e.target.value)} className="p-2 border rounded-lg outline-none font-bold bg-slate-50 flex-1 md:flex-none">
                                <option>2024</option><option>2025</option><option>2026</option><option>2027</option>
                                <option>2028</option><option>2029</option><option>2030</option>
                            </select>
                            <select value={month} onChange={e=>setMonth(e.target.value)} className="p-2 border rounded-lg outline-none font-bold bg-slate-50 flex-1 md:flex-none">{MONTHS.map((m,i)=> i>0 ? <option key={i} value={i.toString()}>{m}</option> : null)}</select>
                        </div>
                        {isAdmin && (
                            <div className="flex flex-wrap gap-2 w-full md:w-auto">
                                <button onClick={()=>setShowReport(true)} className="flex-1 md:flex-none px-4 py-2 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-900 transition flex items-center justify-center gap-2"><IconChartBar size={16}/> Laporan</button>
                                <button onClick={importStandardData} className="flex-1 md:flex-none px-4 py-2 bg-blue-50 text-blue-600 font-bold rounded-lg hover:bg-blue-100 transition whitespace-nowrap">📥 Jana Data Standard</button>
                                <button onClick={importPukal} className="flex-1 md:flex-none px-4 py-2 bg-amber-50 text-amber-600 font-bold rounded-lg hover:bg-amber-100 transition whitespace-nowrap">📥 Templat Kosong</button>
                                <button onClick={openAdd} className="flex-1 md:flex-none px-4 py-2 bg-emerald-500 text-white font-bold rounded-lg hover:bg-emerald-600 transition flex items-center justify-center gap-1">➕ Tambah Manual</button>
                            </div>
                        )}
                    </div>

                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filteredSalaries.length === 0 ? (
                            <div className="col-span-full text-center py-12 bg-white rounded-3xl border border-dashed border-slate-300">
                                <p className="text-slate-500 font-medium mb-4">Tiada rekod slip gaji untuk bulan {MONTHS[parseInt(month)]} {year}.</p>
                                {isAdmin && (
                                    <button onClick={importStandardData} className="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition">
                                        📥 Jana Data Gaji Standard (Untuk Bulan Ini)
                                    </button>
                                )}
                            </div>
                        ) : 
                        filteredSalaries.map(s => {
                            const gross = (s?.basic_salary || 0) + (s?.allowance || 0) + ((s?.ot_hours || 0)*(s?.ot_rate || 0)) + (s?.bonus || 0);
                            const deduct = (s?.kwsp || 0) + (s?.socso || 0) + (s?.eis || 0) + (s?.other_deductions || 0) + (s?.unpaid_leave_deduction || 0) + (s?.late_deduction || 0) + (s?.advance_payment || 0);
                            const net = gross - deduct;
                            const emp = employees.find(e => e.code === s.empCode);
                            // Kami gunakan s.empName terus dari gaji jika emp tidak dijumpai
                            const displayName = emp ? emp.name : (s.empName || 'Pekerja Tidak Diketahui');
                            
                            return (
                                <div key={s.id} className="bg-white p-5 rounded-3xl shadow-sm border relative hover:shadow-md transition flex flex-col justify-between h-full">
                                    <div>
                                        <div className="flex justify-between items-start mb-4 gap-2">
                                            <div className="overflow-hidden">
                                                <h3 className="font-bold text-slate-800 uppercase text-sm leading-tight truncate" title={displayName}>{displayName}</h3>
                                                <p className="text-xs text-slate-400 mt-1 font-mono">{s.empCode}</p>
                                            </div>
                                            <button onClick={()=>printSlip(s, displayName, s.icNumber || emp?.ic, s.dept || emp?.dept, s.position || emp?.position)} className="text-blue-600 bg-blue-50 hover:bg-blue-100 p-2 rounded-xl transition flex-shrink-0"><IconPrinter size={20}/></button>
                                        </div>
                                        <div className="bg-gradient-to-br from-emerald-50 to-emerald-100/50 p-4 rounded-2xl mb-4 text-center border border-emerald-100/50">
                                            <p className="text-[10px] text-emerald-600 font-bold uppercase tracking-wider mb-1">Gaji Bersih</p>
                                            <p className="text-3xl font-black text-emerald-700 tracking-tight">RM {net.toLocaleString('ms-MY',{minimumFractionDigits:2})}</p>
                                        </div>
                                        <div className="flex justify-between text-xs text-slate-500 font-medium px-2 mb-4 bg-slate-50 p-2 rounded-lg">
                                            <span>Kasar: RM {gross.toFixed(2)}</span>
                                            <span className="text-rose-500">Tolak: RM {deduct.toFixed(2)}</span>
                                        </div>
                                    </div>
                                    {isAdmin && (
                                        <div className="grid grid-cols-2 gap-2 mt-auto">
                                            <button onClick={()=>openEdit(s)} className="py-2.5 bg-slate-100 rounded-xl text-xs font-bold hover:bg-slate-200 text-slate-700 flex justify-center items-center gap-1"><IconEdit size={14}/> Edit</button>
                                            <button onClick={()=>deleteSalary(s.id)} className="py-2.5 bg-rose-50 text-rose-600 rounded-xl text-xs font-bold hover:bg-rose-100 flex justify-center items-center gap-1"><IconTrash size={14}/> Padam</button>
                                        </div>
                                    )}
                                </div>
                            )
                        })}
                    </div>

                    {/* MODAL EDIT/ADD */}
                    {modalForm && isAdmin && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto animate-fade shadow-2xl">
                                <div className="sticky top-0 bg-white px-6 py-5 border-b flex justify-between items-center z-10">
                                    <h2 className="font-black text-xl text-slate-800">{modalForm.mode==='add'?'Tambah Rekod Gaji':'Edit Rekod Gaji'}</h2>
                                    <button type="button" onClick={closeM} className="p-2 bg-slate-100 hover:bg-slate-200 transition rounded-full text-slate-600">✕</button>
                                </div>
                                <form onSubmit={saveSalary} className="p-6 space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {modalForm.mode === 'add' && (
                                            <div className="col-span-full">
                                                <label className="text-xs font-bold text-slate-500 block mb-2 uppercase">Pilih Pekerja</label>
                                                <select className="w-full p-3 border-2 border-slate-200 rounded-xl outline-none font-bold bg-slate-50 focus:border-blue-500 transition" value={modalForm.data.empCode} onChange={e=>handleFormChange(e, 'empCode')}>
                                                    {employees.filter(e=>(e?.code || '')!=='ADMIN').map(e=><option key={e.code} value={e.code}>{e.name} ({e.code})</option>)}
                                                </select>
                                            </div>
                                        )}
                                        
                                        <div className="col-span-full mt-2 border-b pb-2"><h3 className="text-sm font-black text-emerald-600 uppercase flex items-center gap-2">💰 Pendapatan</h3></div>
                                        
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 block mb-1">Gaji Asas (RM)</label>
                                            <input type="number" step="0.01" className="w-full p-3 border rounded-xl font-bold focus:border-emerald-500 outline-none" value={modalForm.data.basic_salary} onChange={e=>handleFormChange(e, 'basic_salary')} required/>
                                            <p className="text-[10px] text-emerald-600 font-bold mt-1 ml-1">Kadar Sehari: RM {(parseFloat(modalForm.data.basic_salary||0)/26).toFixed(2)}</p>
                                        </div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Elaun / Bonus (RM)</label><input type="number" step="0.01" className="w-full p-3 border rounded-xl focus:border-emerald-500 outline-none" value={modalForm.data.allowance} onChange={e=>handleFormChange(e, 'allowance')}/></div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Jam OT (Berapa Jam?)</label><input type="number" step="0.5" className="w-full p-3 border rounded-xl focus:border-emerald-500 outline-none" value={modalForm.data.ot_hours} onChange={e=>handleFormChange(e, 'ot_hours')}/></div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Kadar OT (RM sejam)</label><input type="number" step="0.01" className="w-full p-3 border rounded-xl focus:border-emerald-500 outline-none" value={modalForm.data.ot_rate} onChange={e=>handleFormChange(e, 'ot_rate')}/></div>
                                        
                                        <div className="col-span-full mt-4 border-b pb-2"><h3 className="text-sm font-black text-rose-600 uppercase flex items-center gap-2">📉 Potongan</h3></div>
                                        
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">KWSP (RM)</label><input type="number" step="0.01" className="w-full p-3 border rounded-xl focus:border-rose-500 outline-none" value={modalForm.data.kwsp} onChange={e=>handleFormChange(e, 'kwsp')}/></div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Advance (Pendahuluan) (RM)</label><input type="number" step="0.01" className="w-full p-3 border-2 border-rose-100 rounded-xl text-rose-700 font-bold bg-rose-50 focus:border-rose-500 outline-none" value={modalForm.data.advance_payment} onChange={e=>handleFormChange(e, 'advance_payment')}/></div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Lain-lain (SOCSO/EIS) (RM)</label><input type="number" step="0.01" className="w-full p-3 border rounded-xl focus:border-rose-500 outline-none" value={modalForm.data.other_deductions} onChange={e=>handleFormChange(e, 'other_deductions')}/></div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Denda Lewat (RM)</label><input type="number" step="0.01" className="w-full p-3 border rounded-xl focus:border-rose-500 outline-none" value={modalForm.data.late_deduction} onChange={e=>handleFormChange(e, 'late_deduction')}/></div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Hari Cuti Tanpa Gaji</label><input type="number" min="0" className="w-full p-3 border rounded-xl bg-slate-50 focus:border-rose-500 outline-none" value={modalForm.data.unpaid_leave_days} onChange={e=>handleFormChange(e, 'unpaid_leave_days')}/></div>
                                        <div><label className="text-xs font-bold text-slate-500 block mb-1">Potongan Cuti (RM) - Auto</label><input type="number" step="0.01" readOnly className="w-full p-3 border border-slate-200 rounded-xl text-rose-500 bg-slate-100 font-bold cursor-not-allowed" value={modalForm.data.unpaid_leave_deduction} /></div>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition mt-6">Simpan Rekod Gaji</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL LAPORAN */}
                    {showReport && isAdmin && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-y-auto animate-fade shadow-2xl p-8">
                                <div className="flex justify-between items-center mb-8 border-b pb-4">
                                    <div>
                                        <h2 className="font-black text-3xl text-slate-800 tracking-tight">Laporan Keseluruhan</h2>
                                        <p className="text-sm font-bold text-slate-500 mt-1 uppercase">Tahun {year}</p>
                                    </div>
                                    <button onClick={()=>setShowReport(false)} className="p-3 bg-slate-100 hover:bg-slate-200 rounded-full transition">✕</button>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                    <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                                        <p className="text-[10px] font-bold text-blue-600 uppercase mb-2">J. Kasar (Syarikat)</p>
                                        <p className="text-xl lg:text-2xl font-black text-slate-800 tracking-tight">RM {salaries.filter(s=>(s?.year || '')===year).reduce((sum,s)=>sum+(s?.basic_salary||0)+(s?.allowance||0)+((s?.ot_hours||0)*(s?.ot_rate||0)),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p>
                                    </div>
                                    <div className="bg-emerald-50 p-5 rounded-2xl border border-emerald-100">
                                        <p className="text-[10px] font-bold text-emerald-600 uppercase mb-2">J. Bersih (Dibayar)</p>
                                        <p className="text-xl lg:text-2xl font-black text-emerald-700 tracking-tight">RM {salaries.filter(s=>(s?.year || '')===year).reduce((sum,s)=>sum+((s?.basic_salary||0)+(s?.allowance||0)+((s?.ot_hours||0)*(s?.ot_rate||0))-((s?.kwsp||0)+(s?.socso||0)+(s?.eis||0)+(s?.other_deductions||0)+(s?.unpaid_leave_deduction||0)+(s?.advance_payment||0)+(s?.late_deduction||0))),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p>
                                    </div>
                                    <div className="bg-rose-50 p-5 rounded-2xl border border-rose-100">
                                        <p className="text-[10px] font-bold text-rose-600 uppercase mb-2">J. Potongan KWSP</p>
                                        <p className="text-xl lg:text-2xl font-black text-rose-700 tracking-tight">RM {salaries.filter(s=>(s?.year || '')===year).reduce((sum,s)=>sum+(s?.kwsp||0),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p>
                                    </div>
                                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100">
                                        <p className="text-[10px] font-bold text-amber-600 uppercase mb-2">J. Bayaran OT</p>
                                        <p className="text-xl lg:text-2xl font-black text-amber-700 tracking-tight">RM {salaries.filter(s=>(s?.year || '')===year).reduce((sum,s)=>sum+((s?.ot_hours||0)*(s?.ot_rate||0)),0).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl text-center">
                                    <p className="text-sm font-medium text-slate-500 italic">Sila gunakan perisian perakaunan rasmi syarikat untuk mencetak penyata tahunan (EA Form) yang sah.</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // MODUL 2: SENARAI PEKERJA (ADMIN)
        // ==========================================
        function ModuleAdmin({ employees, showToast, db }) {
            const [empForm, setEmpForm] = useState(null);

            const saveEmp = async (e) => {
                e.preventDefault();
                try {
                    await window.fbModules.setDoc(window.fbModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', empForm.code.toUpperCase()), { ...empForm, code: empForm.code.toUpperCase(), name: empForm.name.toUpperCase(), basic: parseFloat(empForm.basic)||0 }, {merge:true});
                    showToast("Profil Pekerja Disimpan", "success"); setEmpForm(null);
                } catch(err) { 
                    console.warn("Gagal simpan pekerja (Luar Talian):", err.message);
                    showToast("Gagal menyimpan profil. Sila periksa Rules Firebase.", "error"); 
                }
            };

            const deleteEmp = async (code) => {
                if(window.confirm("Padam pekerja ini dari sistem?")) {
                    try {
                        await window.fbModules.deleteDoc(window.fbModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'employees', code));
                    } catch(err) {
                        console.warn("Gagal padam pekerja (Luar Talian):", err.message);
                        showToast("Gagal memadam. Sila periksa Rules Firebase.", "error"); 
                    }
                }
            };

            return (
                <div className="space-y-6 max-w-5xl mx-auto">
                    <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                            <h3 className="font-black text-xl text-slate-800 flex items-center gap-2"><IconUsers/> Direktori Pekerja</h3>
                            <button onClick={()=>setEmpForm({code:'',name:'',dept:'',position:'',basic:0,ic:''})} className="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-xl shadow-md shadow-blue-600/20 hover:bg-blue-700 transition flex items-center gap-2">➕ Tambah Baru</button>
                        </div>
                        <div className="overflow-x-auto p-4">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-white text-xs text-slate-400 font-bold uppercase border-b-2">
                                    <tr><th className="p-4 pb-3">Kod Login</th><th className="p-4 pb-3">Nama</th><th className="p-4 pb-3">Jawatan / Jabatan</th><th className="p-4 pb-3">Gaji Asas</th><th className="p-4 pb-3 w-32 text-right">Tindakan</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {employees.map(e => (
                                        <tr key={e.code} className="hover:bg-slate-50/50 transition">
                                            <td className="p-4 font-mono font-bold text-slate-500">{e?.code || ''}</td>
                                            <td className="p-4 font-bold text-slate-800 uppercase">{e?.name || ''}</td>
                                            <td className="p-4 text-xs font-medium text-slate-600">{e?.position || '-'} <br/><span className="text-blue-500">{e?.dept || '-'}</span></td>
                                            <td className="p-4 text-emerald-600 font-black">RM {e?.basic || 0}</td>
                                            <td className="p-4">
                                                <div className="flex gap-2 justify-end">
                                                    <button onClick={()=>setEmpForm(e)} className="px-3 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg text-xs font-bold transition flex items-center gap-1"><IconEdit size={14}/> Edit Profil</button>
                                                    {(e?.code || '') !== 'ADMIN' && <button onClick={()=>deleteEmp(e.code)} className="p-1.5 bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white rounded-lg transition"><IconTrash size={16}/></button>}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {empForm && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-xl p-8 shadow-2xl animate-fade">
                                <h2 className="font-black text-2xl mb-6 border-b pb-4 text-slate-800">{empForm.code && employees.some(e=>e.code===empForm.code) ? 'Kemaskini Profil Pekerja' : 'Daftar Pekerja Baru'}</h2>
                                <form onSubmit={saveEmp} className="space-y-5">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div><label className="text-xs font-bold text-slate-500 mb-1 block uppercase tracking-wider">Kod Login (Unik)</label><input type="text" disabled={empForm.code !== '' && employees.some(e=>(e?.code || '')===empForm.code)} value={empForm.code} onChange={e=>setEmpForm({...empForm,code:e.target.value.toUpperCase()})} className="w-full p-3 border-2 border-slate-200 rounded-xl uppercase bg-slate-50 font-mono focus:bg-white focus:border-blue-500 outline-none transition" placeholder="Cth: MZBE012025" required/></div>
                                        <div><label className="text-xs font-bold text-slate-500 mb-1 block uppercase tracking-wider">No. Kad Pengenalan</label><input type="text" value={empForm.ic} onChange={e=>setEmpForm({...empForm,ic:e.target.value})} className="w-full p-3 border-2 border-slate-200 rounded-xl focus:bg-white focus:border-blue-500 outline-none transition" placeholder="Cth: 900101-01-1234"/></div>
                                        <div className="md:col-span-2"><label className="text-xs font-bold text-slate-500 mb-1 block uppercase tracking-wider">Nama Penuh</label><input type="text" value={empForm.name} onChange={e=>setEmpForm({...empForm,name:e.target.value.toUpperCase()})} className="w-full p-3 border-2 border-slate-200 rounded-xl uppercase focus:bg-white focus:border-blue-500 outline-none transition" placeholder="Nama mengikut IC" required/></div>
                                        
                                        <div><label className="text-xs font-bold text-slate-500 mb-1 block uppercase tracking-wider">Jabatan</label><input type="text" value={empForm.dept} onChange={e=>setEmpForm({...empForm,dept:e.target.value})} className="w-full p-3 border-2 border-slate-200 rounded-xl focus:bg-white focus:border-blue-500 outline-none transition" placeholder="Cth: Pengeluaran" required/></div>
                                        <div><label className="text-xs font-bold text-slate-500 mb-1 block uppercase tracking-wider">Jawatan</label><input type="text" value={empForm.position} onChange={e=>setEmpForm({...empForm,position:e.target.value})} className="w-full p-3 border-2 border-slate-200 rounded-xl focus:bg-white focus:border-blue-500 outline-none transition" placeholder="Cth: Operator Mesin" required/></div>
                                        
                                        <div className="md:col-span-2 mt-2 pt-4 border-t"><label className="text-xs font-black text-emerald-600 mb-1 block uppercase tracking-wider">Gaji Asas Bulanan (RM)</label><input type="number" step="0.01" value={empForm.basic} onChange={e=>setEmpForm({...empForm,basic:e.target.value})} className="w-full p-4 text-lg border-2 border-emerald-200 bg-emerald-50/30 rounded-xl outline-none focus:border-emerald-500 focus:bg-white font-black text-emerald-800 transition" placeholder="0.00" required/></div>
                                    </div>
                                    <div className="flex gap-3 pt-6"><button type="button" onClick={()=>setEmpForm(null)} className="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl font-bold hover:bg-slate-200 transition">Batal</button><button type="submit" className="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-600/30">Simpan Profil</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // KOMPONEN UTAMA (MainApp)
        // ==========================================
        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('salary');
            const [employees, setEmployees] = useState([]);
            const [salaries, setSalaries] = useState([]);
            const [toast, setToast] = useState(null);
            const [isDbReady, setIsDbReady] = useState(false);

            const { initializeApp, getFirestore, collection, doc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, setDoc } = window.fbModules;

            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyAd_sBPBJ4Zru0gbX8dCD9FxJ4Qc0Dt7-Q",
                authDomain: "sistemgajimuiz.firebaseapp.com",
                projectId: "sistemgajimuiz",
                storageBucket: "sistemgajimuiz.firebasestorage.app",
                messagingSenderId: "971845171525",
                appId: "1:971845171525:web:a4ba8a5848d2262dac262c"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            const showToast = useCallback((msg, type = 'info') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 4000);
            }, []);

            // 1. AUTH FIRST
            useEffect(() => {
                let isMounted = true;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { 
                        if(isMounted) console.warn("Auth Fail:", e.message); 
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, user => { 
                    if(isMounted) setUser(user); 
                });
                return () => {
                    isMounted = false;
                    unsubscribe();
                };
            }, [auth, signInAnonymously, signInWithCustomToken]);

            // 2. MEMUATKAN DATA DEFAULT ATAU FIREBASE
            useEffect(() => {
                let isMounted = true;
                
                const loadData = async () => {
                    setEmployees(DEFAULT_EMPLOYEES);
                    setIsDbReady(true);
                }

                if (!user) {
                   loadData();
                   return;
                }
                
                let unsubscribeEmp;
                let unsubscribeSal;
                
                try {
                    const bPath = ['artifacts', APP_ID, 'public', 'data'];
                    
                    unsubscribeEmp = onSnapshot(collection(db, ...bPath, 'employees'), 
                        snap => { 
                            if(!isMounted) return;
                            const emps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            if(emps.length === 0) {
                                DEFAULT_EMPLOYEES.forEach(e => setDoc(doc(db, ...bPath, 'employees', e.code), e).catch(err => {}));
                                setEmployees(DEFAULT_EMPLOYEES);
                            } else { 
                                setEmployees(emps); 
                            }
                            setIsDbReady(true); 
                        },
                        err => {
                            if(isMounted) {
                                console.warn("Pangkalan data Disekat (Emp):", err.message);
                                setEmployees(DEFAULT_EMPLOYEES);
                                setIsDbReady(true);
                            }
                        }
                    );
                    
                    unsubscribeSal = onSnapshot(collection(db, ...bPath, 'salaries'), 
                        snap => {
                            if(isMounted) setSalaries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        },
                        err => {
                            if(isMounted) console.warn("Pangkalan data Disekat (Sal):", err.message);
                        }
                    );
                } catch(error) {
                    if(isMounted) {
                        console.warn("Gagal Membina Pendengar Database:", error.message);
                        setEmployees(DEFAULT_EMPLOYEES);
                        setIsDbReady(true);
                    }
                }

                return () => { 
                    isMounted = false;
                    if(unsubscribeEmp) unsubscribeEmp(); 
                    if(unsubscribeSal) unsubscribeSal(); 
                };
            }, [user, db, showToast]);

            if (!currentUser) return <LoginScreen employees={employees} onLogin={setCurrentUser} isReady={isDbReady} showToast={showToast} />;

            return (
                <div className="min-h-screen flex flex-col bg-slate-100">
                    <header className="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center z-20">
                        <div className="flex items-center gap-4">
                            <BrandLogo size="small" />
                            <div><h1 className="font-bold tracking-tight">Sistem Gaji MBE</h1><p className="text-[10px] text-blue-300 font-bold uppercase tracking-widest">{currentUser.name}</p></div>
                        </div>
                        <button onClick={() => setCurrentUser(null)} className="bg-rose-500/20 text-rose-400 hover:bg-rose-500 hover:text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition"><IconLogOut/> Keluar</button>
                    </header>
                    <div className="bg-white border-b shadow-sm z-10 overflow-x-auto hide-scroll sticky top-0">
                        <div className="max-w-7xl mx-auto px-4 flex gap-6">
                            <TabBtn label={currentUser.code === 'ADMIN' ? "Urusan Gaji" : "Slip Gaji Saya"} icon="💰" active={activeTab === 'salary'} onClick={() => setActiveTab('salary')} />
                            {currentUser.code === 'ADMIN' && <TabBtn label="Direktori Pekerja" icon="👨‍💼" active={activeTab === 'admin'} onClick={() => setActiveTab('admin')} />}
                        </div>
                    </div>
                    <main className="flex-1 p-4 md:p-6 overflow-y-auto">
                        <div className="max-w-7xl mx-auto animate-fade">
                            {activeTab === 'salary' && <ModuleSalary user={currentUser} salaries={salaries} employees={employees} showToast={showToast} db={db} />}
                            {activeTab === 'admin' && currentUser?.code === 'ADMIN' && <ModuleAdmin employees={employees} showToast={showToast} db={db} />}
                        </div>
                    </main>
                    {toast && (
                        <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl font-bold text-white z-50 flex items-center gap-3 animate-fade ${toast.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                            {toast.type === 'success' ? <IconCheck/> : <IconAlert/>} {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<MainApp />);
        }
    </script>
</body>
</html>
