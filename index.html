<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Gaji - Muiz Banner Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div id="root"></div>

    <!-- Modul Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        window.fbModules = { initializeApp, getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <!-- Aplikasi React -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, Fragment } = React;

        // --- KONFIGURASI GLOBAL ---
        const APP_ID = 'sistemgajimzbe'; 
        const MONTHS = ['', 'Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];

        const DEFAULT_EMPLOYEES = [
            { code: 'MZBE012024', name: 'AHMAD BUKHARIE BIN FAIZAL NORHADI', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1800, ic: '040421110053' },
            { code: 'MZBE092022', name: 'AMMAR ZAKWAN BIN DAUD', dept: 'Operasi', position: 'Pengurus Order Luar', basic: 2100, ic: '980416036979' },
            { code: 'MZBE102022', name: 'ATHIRAH BINTI MOHD ZEIN', dept: 'Pengeluaran', position: 'Pegawai Operasi Pengeluaran', basic: 2000, ic: '000917110384' },
            { code: 'MZBE072022', name: 'NUR MAISARAH BINTI AHMAD RIZAL', dept: 'Operasi', position: 'Pengurus Shopee', basic: 2300, ic: '971017385034' },
            { code: 'MZBE022024', name: 'NURLAILI BINTI ZAHARI', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1800, ic: '' },
            { code: 'MZBE082022', name: 'WAN ADIB ASHRAF BIN AB WAHAB', dept: 'Operasi', position: 'Pengurus TikTok', basic: 2300, ic: '000417080975' },
            { code: 'MZBE022025', name: 'ABDUL RAHMAN BIN S. HAMID', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1700, ic: '070909030855' },
            { code: 'MZBE032025', name: 'MUHAMMAD AIMAN BIN MOHD ZULKIFLI', dept: 'Pengeluaran', position: 'Operator Mesin', basic: 1700, ic: '010815110403' },
            { code: 'MZBE042025', name: 'FATIN AMIERA BINTI RAZIHA', dept: 'Pemasaran', position: 'Pegawai Pemasaran', basic: 1700, ic: '930905115074' },
            { code: 'MZBEBOSS001', name: 'MUIZZUDDIN BIN AB.LLAH', dept: 'Pentadbiran', position: 'Pengurus Besar', basic: 3500, ic: '990331037699' },
            { code: 'ADMIN', name: 'SUPER ADMIN', dept: 'Pengurusan', position: 'Admin', basic: 0, ic: '' }
        ];

        // --- IKON ---
        const IconLogOut = ({size=18}) => <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const IconCheck = ({size=24}) => <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconAlert = ({size=24}) => <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
        const IconEdit = ({size=16}) => <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconPrinter = ({size=18}) => <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;

        // ==========================================
        // UI COMPONENTS
        // ==========================================
        function BrandLogo({ size = "large" }) {
            return (
                <div className={`flex flex-col items-center justify-center ${size === 'large' ? 'mb-6' : 'mb-0 shrink-0'}`}>
                    <img 
                        src="./logo.jpg" 
                        alt="MBE Logo" 
                        style={{ height: size === 'large' ? '90px' : '32px', width: 'auto', objectFit: 'contain' }} 
                        className={size === 'large' ? 'mb-3' : ''} 
                        onError={e => { e.target.onerror=null; e.target.src='https://ui-avatars.com/api/?name=MBE&background=1e293b&color=ffffff&rounded=true&bold=true'; }} 
                    />
                    {size === 'large' && <div className="text-center"><h1 className="text-2xl font-black text-slate-800 tracking-tight uppercase">Muiz Banner</h1><p className="text-xs font-bold text-blue-600 uppercase tracking-[0.2em] mt-1">Sistem Gaji</p></div>}
                </div>
            );
        }

        function LoginScreen({ employees, onLogin, isReady, showToast }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const cleanUser = username.trim().toUpperCase();
                if(cleanUser === 'ADMIN' && password === 'admin123') {
                    onLogin({ code: 'ADMIN', name: 'Administrator' }); return;
                }
                const emp = employees.find(e => (e?.code || '') === cleanUser);
                if(emp && password === emp.code) {
                    onLogin(emp);
                } else {
                    showToast("ID atau Kata Laluan tidak sah.", "error");
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-xl border border-slate-100 animate-fade">
                        <BrandLogo size="large" />
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Kod Pekerja</label>
                                <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none uppercase font-bold text-slate-700 transition" placeholder="Cth: MZBE012024 / ADMIN" required/>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Kata Laluan</label>
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-blue-500 outline-none font-bold text-slate-700 transition" placeholder="Masukkan kata laluan" required/>
                            </div>
                            <button type="submit" disabled={!isReady} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-blue-700 transition disabled:opacity-50 flex justify-center items-center gap-2">
                                {!isReady && <div className="loader border-white border-t-blue-600 w-5 h-5"></div>}
                                {isReady ? 'Log Masuk Sistem' : 'Memuat Data...'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // MODULES (Salary & Admin)
        // ==========================================
        function ModuleSalary({ user, salaries, employees, showToast, db, appId }) {
            const { doc, setDoc, deleteDoc } = window.fbModules;
            const isAdmin = user?.code === 'ADMIN';
            const [year, setYear] = useState(new Date().getFullYear().toString());
            const [month, setMonth] = useState((new Date().getMonth() + 1).toString());

            const filteredSalaries = salaries.filter(s => (s?.year || '') === year && (s?.month || '') === month && (isAdmin || s?.empCode === user.code));

            const importStandardData = async () => {
                if(!window.confirm(`Anda pasti mahu jana senarai pekerja & data gaji standard untuk bulan ${MONTHS[parseInt(month)]} ${year}?`)) return;
                showToast(`Menjana data...`, 'info');
                
                const standardData = [
                    { empCode: 'MZBE012024', name: 'AHMAD BUKHARIE BIN FAIZAL NORHADI', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '040421110053', advance_payment: 700, kwsp: 198, basic_salary: 1800 },
                    { empCode: 'MZBE092022', name: 'AMMAR ZAKWAN BIN DAUD', dept: 'Operasi', position: 'Pengurus Order Luar', ic: '980416036979', advance_payment: 800, kwsp: 231, basic_salary: 2100 },
                    { empCode: 'MZBE102022', name: 'ATHIRAH BINTI MOHD ZEIN', dept: 'Pengeluaran', position: 'Pegawai Operasi Pengeluaran', ic: '000917110384', advance_payment: 800, kwsp: 220, basic_salary: 2000 },
                    { empCode: 'MZBE072022', name: 'NUR MAISARAH BINTI AHMAD RIZAL', dept: 'Operasi', position: 'Pengurus Shopee', ic: '971017385034', advance_payment: 1000, kwsp: 253, basic_salary: 2300 },
                    { empCode: 'MZBE022024', name: 'NURLAILI BINTI ZAHARI', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '', advance_payment: 0, kwsp: 198, basic_salary: 1800 },
                    { empCode: 'MZBE082022', name: 'WAN ADIB ASHRAF BIN AB WAHAB', dept: 'Operasi', position: 'Pengurus TikTok', ic: '000417080975', advance_payment: 1000, kwsp: 253, unpaid_leave_days: 4, unpaid_leave_deduction: 353.84, basic_salary: 2300 },
                    { empCode: 'MZBE022025', name: 'ABDUL RAHMAN BIN S. HAMID', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '070909030855', advance_payment: 700, kwsp: 187, basic_salary: 1700 },
                    { empCode: 'MZBE032025', name: 'MUHAMMAD AIMAN BIN MOHD ZULKIFLI', dept: 'Pengeluaran', position: 'Operator Mesin', ic: '010815110403', advance_payment: 700, kwsp: 187, basic_salary: 1700 },
                    { empCode: 'MZBE042025', name: 'FATIN AMIERA BINTI RAZIHA', dept: 'Pemasaran', position: 'Pegawai Pemasaran', ic: '930905115074', advance_payment: 0, kwsp: 187, unpaid_leave_days: 12, unpaid_leave_deduction: 784.80, basic_salary: 1700 },
                    { empCode: 'MZBEBOSS001', name: 'MUIZZUDDIN BIN AB.LLAH', dept: 'Pentadbiran', position: 'Pengurus Besar', ic: '990331037699', advance_payment: 0, kwsp: 352, basic_salary: 3500 }
                ];
                
                try {
                    for (const d of standardData) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', d.empCode), { code: d.empCode, name: d.name, ic: d.ic, dept: d.dept, position: d.position, basic: d.basic_salary }, {merge:true});
                        const recordId = `sal_${d.empCode}_${year}_${month}`;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'salaries', recordId), { empCode: d.empCode, empName: d.name, icNumber: d.ic, dept: d.dept, position: d.position, year, month, basic_salary: d.basic_salary, kwsp: d.kwsp, advance_payment: d.advance_payment, unpaid_leave_days: d.unpaid_leave_days||0, unpaid_leave_deduction: d.unpaid_leave_deduction||0, allowance:0, ot_hours:0, ot_rate:10, bonus:0, socso:0, eis:0, other_deductions:0, late_deduction:0, updatedAt: new Date().toISOString() }, {merge:true});
                    }
                    showToast(`Selesai menjana data.`, 'success');
                } catch(err) { showToast('Ralat. Periksa Firebase Rules.', 'error'); }
            };

            const printSlip = (sal) => {
                const gross = (sal?.basic_salary || 0) + (sal?.allowance || 0) + ((sal?.ot_hours || 0)*(sal?.ot_rate || 0)) + (sal?.bonus || 0);
                const deduct = (sal?.kwsp || 0) + (sal?.socso || 0) + (sal?.eis || 0) + (sal?.other_deductions || 0) + (sal?.unpaid_leave_deduction || 0) + (sal?.late_deduction || 0) + (sal?.advance_payment || 0);
                const html = `<html><head><title>Slip Gaji</title><style>body{font-family:sans-serif;padding:40px;line-height:1.6} .row{display:flex;justify-content:space-between;border-bottom:1px dashed #ccc;padding:5px 0}</style></head><body><h2 style="text-align:center">MUIZ BANNER EMPIRE<br><small>Slip Gaji ${MONTHS[parseInt(sal.month)]} ${sal.year}</small></h2><div style="background:#f9f9f9;padding:15px;border-radius:8px;margin-bottom:20px"><p style="margin:0;text-transform:uppercase"><b>Nama:</b> ${sal.empName}<br><b>IC:</b> ${sal.icNumber||'-'}<br><b>Jabatan:</b> ${sal.dept||'-'}</p></div><div style="display:flex;gap:20px"><div style="flex:1"><h3>Pendapatan</h3><div class="row"><span>Gaji Asas</span><span>RM ${(sal.basic_salary || 0).toFixed(2)}</span></div><div class="row"><span>OT</span><span>RM ${((sal.ot_hours || 0)*(sal.ot_rate || 0)).toFixed(2)}</span></div><br><div class="row"><b>Jumlah Kasar</b><b>RM ${gross.toFixed(2)}</b></div></div><div style="flex:1"><h3>Potongan</h3><div class="row"><span>KWSP/Potongan</span><span>RM ${deduct.toFixed(2)}</span></div><br><div class="row"><b>Gaji Bersih</b><b>RM ${(gross-deduct).toFixed(2)}</b></div></div></div></body></html>`;
                const w = window.open('','_blank'); w.document.write(html); w.document.close(); setTimeout(()=>w.print(), 500);
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex gap-2">
                            <select value={year} onChange={e=>setYear(e.target.value)} className="p-2 border rounded-lg font-bold bg-slate-50">{[2024,2025,2026,2027,2028,2029,2030].map(y=><option key={y}>{y}</option>)}</select>
                            <select value={month} onChange={e=>setMonth(e.target.value)} className="p-2 border rounded-lg font-bold bg-slate-50">{MONTHS.map((m,i)=> i>0 ? <option key={i} value={i.toString()}>{m}</option> : null)}</select>
                        </div>
                        {isAdmin && <button onClick={importStandardData} className="w-full md:w-auto px-6 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">📥 Jana Data Standard</button>}
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filteredSalaries.length === 0 ? <div className="col-span-full text-center py-12 text-slate-400">Tiada rekod untuk bulan ini.</div> : 
                        filteredSalaries.map(s => (
                            <div key={s.id} className="bg-white p-5 rounded-3xl shadow-sm border relative animate-fade">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="overflow-hidden"><h3 className="font-bold text-slate-800 uppercase text-sm truncate">{s.empName}</h3><p className="text-xs text-slate-400 mt-1 font-mono">{s.empCode}</p></div>
                                    <button onClick={()=>printSlip(s)} className="text-blue-600 bg-blue-50 p-2 rounded-xl"><IconPrinter/></button>
                                </div>
                                <div className="bg-emerald-50 p-4 rounded-2xl mb-4 text-center border border-emerald-100">
                                    <p className="text-[10px] text-emerald-600 font-bold uppercase">Gaji Bersih</p>
                                    <p className="text-2xl font-black text-emerald-700">RM {((s?.basic_salary||0)+(s?.allowance||0)+(s?.bonus||0)+((s?.ot_hours||0)*(s?.ot_rate||0)) - ((s?.kwsp||0)+(s?.socso||0)+(s?.eis||0)+(s?.other_deductions||0)+(s?.unpaid_leave_deduction||0)+(s?.advance_payment||0)+(s?.late_deduction||0))).toLocaleString('ms-MY',{minimumFractionDigits:2})}</p>
                                </div>
                                {isAdmin && <div className="grid grid-cols-2 gap-2 mt-4"><button className="py-2 bg-slate-100 rounded-xl text-xs font-bold">Edit</button><button onClick={async()=>{ if(window.confirm("Padam?")) await deleteDoc(doc(db,'artifacts',appId,'public', 'data', 'salaries', s.id))}} className="py-2 bg-rose-50 text-rose-600 rounded-xl text-xs font-bold">Padam</button></div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ModuleAdmin({ employees, showToast, db, appId }) {
            const { doc, setDoc } = window.fbModules;
            const [form, setForm] = useState(null);
            const save = async (e) => {
                e.preventDefault();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', form.code.toUpperCase()), { ...form, code: form.code.toUpperCase(), name: form.name.toUpperCase(), basic: parseFloat(form.basic)||0 }, {merge:true});
                    showToast("Tersimpan!", "success"); setForm(null);
                } catch(err) { showToast("Gagal simpan.", "error"); }
            };
            return (
                <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <div className="p-6 bg-slate-50 border-b flex justify-between items-center"><h3 className="font-black text-xl text-slate-800">Direktori Pekerja</h3><button onClick={()=>setForm({code:'',name:'',dept:'',position:'',basic:0,ic:''})} className="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-md">➕ Tambah</button></div>
                    <div className="overflow-x-auto"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-white text-xs text-slate-400 font-bold uppercase border-b-2"><tr><th className="p-4">Kod</th><th className="p-4">Nama</th><th className="p-4">Gaji Asas</th><th className="p-4 text-right">Tindakan</th></tr></thead><tbody className="divide-y divide-slate-100">{employees.map(e=>(<tr key={e.code} className="hover:bg-slate-50 transition"><td className="p-4 font-mono font-bold text-slate-500">{e.code}</td><td className="p-4 font-bold text-slate-800 uppercase">{e.name}</td><td className="p-4 font-bold text-emerald-600">RM {e.basic}</td><td className="p-4 text-right flex gap-2 justify-end"><button onClick={()=>setForm(e)} className="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold flex items-center gap-1"><IconEdit size={14}/> Edit Profil</button></td></tr>))}</tbody></table></div>
                    {form && <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4"><div className="bg-white rounded-3xl w-full max-w-xl p-8 shadow-2xl animate-fade"><h2 className="font-black text-2xl mb-6 border-b pb-4">{form.code ? 'Edit Profil' : 'Daftar Pekerja'}</h2><form onSubmit={save} className="space-y-4"><input type="text" placeholder="KOD LOGIN" value={form.code} onChange={e=>setForm({...form,code:e.target.value})} className="w-full p-3 border-2 rounded-xl uppercase font-mono" required/><input type="text" placeholder="NAMA PENUH" value={form.name} onChange={e=>setForm({...form,name:e.target.value.toUpperCase()})} className="w-full p-3 border-2 rounded-xl uppercase" required/><input type="text" placeholder="NO IC" value={form.ic} onChange={e=>setForm({...form,ic:e.target.value})} className="w-full p-3 border-2 rounded-xl"/><div className="grid grid-cols-2 gap-4"><input type="text" placeholder="JABATAN" value={form.dept} onChange={e=>setForm({...form,dept:e.target.value})} className="p-3 border-2 rounded-xl"/><input type="text" placeholder="JAWATAN" value={form.position} onChange={e=>setForm({...form,position:e.target.value})} className="p-3 border-2 rounded-xl"/></div><input type="number" placeholder="GAJI ASAS" value={form.basic} onChange={e=>setForm({...form,basic:e.target.value})} className="w-full p-4 border-2 border-emerald-200 bg-emerald-50/20 rounded-xl text-lg font-black text-emerald-800" required/><div className="flex gap-3 pt-6"><button type="button" onClick={()=>setForm(null)} className="flex-1 bg-slate-100 py-4 rounded-xl font-bold">Batal</button><button type="submit" className="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">Simpan</button></div></form></div></div>}
                </div>
            );
        }

        // ==========================================
        // MAIN APP
        // ==========================================
        function MainApp() {
            const [user, setUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('salary');
            const [employees, setEmployees] = useState([]);
            const [salaries, setSalaries] = useState([]);
            const [toast, setToast] = useState(null);
            const [isReady, setIsReady] = useState(false);

            const { initializeApp, getFirestore, collection, doc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, setDoc } = window.fbModules;

            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyAd_sBPBJ4Zru0gbX8dCD9FxJ4Qc0Dt7-Q",
                authDomain: "sistemgajimuiz.firebaseapp.com",
                projectId: "sistemgajimuiz",
                storageBucket: "sistemgajimuiz.firebasestorage.app",
                messagingSenderId: "971845171525",
                appId: "1:971845171525:web:a4ba8a5848d2262dac262c"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : APP_ID;

            const showToast = useCallback((msg, type = 'info') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            }, []);

            useEffect(() => {
                const init = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else { await signInAnonymously(auth); }
                    } catch (e) { console.warn(e.message); }
                };
                init();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, [auth, signInAnonymously, signInWithCustomToken]);

            useEffect(() => {
                if (!user) return;
                const bPath = ['artifacts', appId, 'public', 'data'];
                const unsubEmp = onSnapshot(collection(db, ...bPath, 'employees'), snap => {
                    const emps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (emps.length === 0) {
                        DEFAULT_EMPLOYEES.forEach(e => setDoc(doc(db, ...bPath, 'employees', e.code), e).catch(err => {}));
                        setEmployees(DEFAULT_EMPLOYEES);
                    } else { setEmployees(emps); }
                    setIsReady(true);
                }, err => console.warn(err.message));

                const unsubSal = onSnapshot(collection(db, ...bPath, 'salaries'), snap => {
                    setSalaries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, err => console.warn(err.message));

                return () => { unsubEmp(); unsubSal(); };
            }, [user, db, appId, setDoc, doc]);

            if (!currentUser) return <LoginScreen employees={employees} onLogin={setCurrentUser} isReady={isReady} showToast={showToast} />;

            return (
                <div className="min-h-screen flex flex-col bg-slate-100">
                    <header className="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-30">
                        <div className="flex items-center gap-4"><BrandLogo size="small" /><div><h1 className="font-bold tracking-tight">Sistem Gaji MBE</h1><p className="text-[10px] text-blue-300 font-bold uppercase tracking-widest">{currentUser.name}</p></div></div>
                        <button onClick={() => setCurrentUser(null)} className="bg-rose-500/20 text-rose-400 hover:bg-rose-500 hover:text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition"><IconLogOut size={16}/> Keluar</button>
                    </header>
                    <div className="bg-white border-b shadow-sm sticky top-[64px] z-20 overflow-x-auto">
                        <div className="max-w-7xl mx-auto px-4 flex gap-6 whitespace-nowrap">
                            <button onClick={()=>setActiveTab('salary')} className={`px-4 py-4 font-bold text-sm border-b-2 transition-colors ${activeTab==='salary'?'border-blue-600 text-blue-700':'border-transparent text-slate-500'}`}>💰 Urusan Gaji</button>
                            {currentUser.code === 'ADMIN' && <button onClick={()=>setActiveTab('admin')} className={`px-4 py-4 font-bold text-sm border-b-2 transition-colors ${activeTab==='admin'?'border-blue-600 text-blue-700':'border-transparent text-slate-500'}`}>👨‍💼 Direktori Pekerja</button>}
                        </div>
                    </div>
                    <main className="flex-1 p-4 md:p-6 overflow-y-auto max-w-7xl mx-auto w-full">
                        <div className="animate-fade">
                            {activeTab === 'salary' && <ModuleSalary user={currentUser} salaries={salaries} employees={employees} showToast={showToast} db={db} appId={appId} />}
                            {activeTab === 'admin' && currentUser?.code === 'ADMIN' && <ModuleAdmin employees={employees} showToast={showToast} db={db} appId={appId} />}
                        </div>
                    </main>
                    {toast && (
                        <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl font-bold text-white z-50 flex items-center gap-3 animate-fade ${toast.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                            {toast.type === 'success' ? <IconCheck/> : <IconAlert/>} {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
